<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hammy Masters Pool 2026</title>
  <style>
    :root {
      --green-dark:  #0d2410;
      --green-mid:   #2d5a27;
      --green-light: #e8f5e9;
      --gold:        #c9a227;
      --gold-dark:   #9a7a1a;
      --red:         #c0392b;
      --red-light:   #fce4ec;
      --purple-light:#f3e5f5;
      --border:      #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f2f4f2;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(160deg, var(--green-dark) 0%, #1e4a18 60%, #2a5022 100%);
      color: #fff;
      padding: 20px 16px 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 3px 14px rgba(0,0,0,.35);
    }

    header .eyebrow {
      font-size: .68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 4px;
    }

    header h1 {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -.3px;
      line-height: 1.15;
    }

    #tournament-label {
      font-size: .75rem;
      color: rgba(255,255,255,.65);
      margin-top: 3px;
    }

    .header-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    #status-text { font-size: .72rem; color: rgba(255,255,255,.65); }

    .refresh-btn {
      background: var(--gold);
      color: #fff;
      border: none;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .2px;
      transition: background .15s;
    }
    .refresh-btn:hover  { background: var(--gold-dark); }
    .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── MAIN ── */
    main {
      max-width: 740px;
      margin: 0 auto;
      padding: 14px 12px 48px;
    }

    /* ── BANNERS ── */
    .banner {
      border-radius: 8px;
      padding: 9px 13px;
      margin-bottom: 10px;
      font-size: .8rem;
      line-height: 1.4;
    }
    .banner.error   { background: var(--red-light);   color: #b71c1c; border: 1px solid #ef9a9a; }
    .banner.warning { background: #fff8e1; color: #e65100; border: 1px solid #ffcc80; }
    .banner.info    { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

    /* ── LEGEND ── */
    .legend {
      background: #fff;
      border-radius: 9px;
      padding: 9px 13px;
      margin-bottom: 12px;
      font-size: .75rem;
      color: #555;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      display: flex;
      flex-wrap: wrap;
      gap: 3px 18px;
      align-items: center;
    }
    .legend strong { color: #222; }
    .dot-neg { color: #1e6b3a; font-size: .9rem; }
    .dot-pos { color: var(--red); font-size: .9rem; }

    /* ── ENTRY CARDS ── */
    .entry-card {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 9px;
      box-shadow: 0 1px 4px rgba(0,0,0,.09);
      border: 1px solid rgba(0,0,0,.06);
      overflow: hidden;
    }
    .entry-card.pending-card {
      background: #fafafa;
      border-style: dashed;
      border-color: #d0d0d0;
      opacity: .75;
    }

    /* Card clickable header row */
    .card-header {
      display: flex;
      align-items: center;
      padding: 11px 13px;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card-header:active { background: #f5f5f5; }

    .rank-badge {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: .8rem;
      flex-shrink: 0;
      background: #e0e0e0;
      color: #666;
    }
    .rank-badge.gold   { background: var(--gold);   color: #fff; }
    .rank-badge.silver { background: #9e9e9e;        color: #fff; }
    .rank-badge.bronze { background: #a0765e;        color: #fff; }
    .rank-badge.field  { background: var(--green-mid); color: #fff; }

    .card-name {
      flex: 1;
      font-size: 1rem;
      font-weight: 700;
      color: #111;
    }

    .card-total {
      font-size: 1.35rem;
      font-weight: 800;
      min-width: 50px;
      text-align: right;
    }

    .chevron {
      color: #bbb;
      font-size: .85rem;
      margin-left: 2px;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .entry-card.open .chevron { transform: rotate(180deg); }

    /* Score colours */
    .neg  { color: #1a7f3a; }
    .pos  { color: var(--red); }
    .even { color: #444; }

    /* Best-4 preview chips */
    .chips-row {
      padding: 0 13px 10px 57px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--green-light);
      border: 1px solid #c8e6c9;
      border-radius: 14px;
      padding: 2px 9px;
      font-size: .72rem;
      font-weight: 500;
      white-space: nowrap;
    }
    .chip.cut-chip     { background: var(--red-light);    border-color: #ef9a9a; color: #c62828; }
    .chip.invalid-chip { background: var(--purple-light); border-color: #ce93d8; color: #6a1b9a; }
    .chip .cscore      { font-weight: 700; }

    /* ── EXPANDED SECTION ── */
    .card-detail {
      display: none;
      border-top: 1px solid var(--border);
      background: #fafafa;
      padding: 11px 13px 13px;
    }
    .entry-card.open .card-detail { display: block; }

    .detail-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .9px;
      color: #aaa;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .picks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    @media (max-width: 420px) { .picks-grid { grid-template-columns: 1fr; } }

    .pick-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: .8rem;
      gap: 6px;
      min-width: 0;
    }
    .pick-row.top4-row    { background: #f1f8e9; border-color: #aed581; }
    .pick-row.cut-row     { background: var(--red-light);    border-color: #ef9a9a; }
    .pick-row.invalid-row { background: var(--purple-light); border-color: #ce93d8; }

    .pick-name {
      flex: 1;
      font-weight: 500;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pick-right {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .tag {
      font-size: .6rem;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .tag.cut-tag     { background: var(--red-light);    color: var(--red);  border: 1px solid #ef9a9a; }
    .tag.invalid-tag { background: var(--purple-light); color: #6a1b9a;     border: 1px solid #ce93d8; }
    .tag.top4-tag    { background: var(--green-light);  color: #2e7d32;     border: 1px solid #a5d6a7; }

    .pick-score-val {
      font-weight: 800;
      font-size: .88rem;
      min-width: 28px;
      text-align: right;
    }

    /* ── PLAYER LINKS ── */
    a.player-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dotted rgba(0,0,0,.25);
    }
    a.player-link:hover { border-bottom-style: solid; }

    /* ── ROUND TABS ── */
    .round-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .round-tab {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: .73rem;
      font-weight: 600;
      cursor: pointer;
      color: #777;
      transition: all .12s;
      white-space: nowrap;
    }
    .round-tab:hover { border-color: var(--green-mid); color: var(--green-mid); }
    .round-tab.active { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }
    .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #ff4444;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── CONTROLS BAR ── */
    .controls-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .ctrl-btn {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: .73rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: background .12s, border-color .12s;
    }
    .ctrl-btn:hover { background: #f0f0f0; border-color: #bbb; }
    .ctrl-btn.export-btn { margin-left: auto; color: var(--green-mid); border-color: var(--green-mid); }
    .ctrl-btn.export-btn:hover { background: var(--green-light); }

    /* ── SCORE STACK (best-4 + all-8 + delta) ── */
    .score-stack { text-align: right; }
    .all8-label { font-size: .6rem; color: #aaa; margin-top: 1px; white-space: nowrap; }
    .all8-val { font-weight: 700; }

    /* ── DAY DELTA ── */
    .delta-badge {
      font-size: .62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .delta-badge.better { background: #e8f5e9; color: #1a7f3a; border: 1px solid #a5d6a7; }
    .delta-badge.worse  { background: var(--red-light); color: var(--red); border: 1px solid #ef9a9a; }
    .delta-badge.same   { background: #f5f5f5; color: #888; border: 1px solid #ddd; }

    /* ── RANK DELTA ── */
    .rank-delta {
      font-size: .58rem;
      font-weight: 700;
      text-align: center;
      margin-top: 2px;
      white-space: nowrap;
      line-height: 1;
    }
    .rank-delta.up   { color: #1a7f3a; }
    .rank-delta.down { color: var(--red); }
    .rank-delta.flat { color: #aaa; }

    /* ── PLAYER STATUS DOT ── */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }
    .status-dot.playing  { background: #ff4444; animation: pulse 1.2s ease-in-out infinite; }
    .status-dot.finished { background: #aaa; }
    .status-dot.waiting  { background: #d0d0d0; }

    /* ── PLAYER DELTA PILL (inside chip / pick-row) ── */
    .pdelta {
      font-size: .6rem;
      font-weight: 700;
      margin-left: 2px;
    }
    .pdelta.better { color: #1a7f3a; }
    .pdelta.worse  { color: var(--red); }
    .pdelta.same   { color: #aaa; }

    /* ── LOADING ── */
    .loading-state {
      text-align: center;
      padding: 52px 20px;
      color: #777;
      font-size: .9rem;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(45,90,39,.2);
      border-top-color: var(--green-mid);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: .7rem;
      color: #bbb;
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">⛳ Masters Pool 2026</div>
  <h1>Hammy Leaderboard</h1>
  <div id="tournament-label">Fetching tournament info…</div>
  <div class="header-bottom">
    <span id="status-text">Loading…</span>
    <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">↻ Refresh</button>
  </div>
</header>

<main>
  <div id="banners"></div>

  <div id="round-tabs" class="round-tabs" style="display:none"></div>

  <div class="controls-bar">
    <button class="ctrl-btn" onclick="expandAll()">▼ Expand All</button>
    <button class="ctrl-btn" onclick="collapseAll()">▲ Collapse All</button>
    <button class="ctrl-btn export-btn" onclick="exportCSV()">⬇ CSV</button>
  </div>

  <div class="legend">
    <span><strong>Scoring:</strong> Best 4 of 8 picks count · Lower is better</span>
    <span>Missed cut = <strong>+50</strong></span>
    <span>Not yet started = <strong>E</strong></span>
    <span><span class="dot-neg">■</span> under par &nbsp;<span class="dot-pos">■</span> over par</span>
  </div>

  <div id="leaderboard">
    <div class="loading-state">
      <div class="spinner"></div>
      Fetching live scores from ESPN…
    </div>
  </div>
</main>

<footer>Live data via ESPN Golf API · Auto-refreshes every 5 min</footer>

<script>
// ─── POOL DATA ────────────────────────────────────────────────────────────────
// Full ESPN display names used for API matching.
// canadians: Set of names to flag 🇨🇦
// invalid:   Set of names not in the field (auto-scored +50)

const POOL = [
  {
    name: 'Charlie',
    picks: [
      'Scottie Scheffler', 'Matt Fitzpatrick', 'Ludvig Åberg', 'Jon Rahm',
      'Tyrrell Hatton', 'Jason Day', 'Bryson DeChambeau', 'Corey Conners',
    ],
    canadians: new Set(['Corey Conners']),
  },
  {
    name: 'Ben',
    picks: [
      'Scottie Scheffler', 'Matt Fitzpatrick', 'Chris Gotterup', 'Patrick Reed',
      'Tyrrell Hatton', 'Jake Knapp', 'Jon Rahm', 'Corey Conners',
    ],
    canadians: new Set(['Corey Conners']),
  },
  {
    name: 'Pete',
    picks: [
      'Scottie Scheffler', 'Justin Rose', 'Ludvig Åberg', 'Bryson DeChambeau',
      'Shane Lowry', 'Corey Conners', 'Jon Rahm', 'Nick Taylor',
    ],
    canadians: new Set(['Corey Conners', 'Nick Taylor']),
  },
  {
    name: 'Sydney',
    picks: [
      'Rory McIlroy', 'Tommy Fleetwood', 'Ludvig Åberg', 'Bryson DeChambeau',
      'Shane Lowry', 'Corey Conners', 'Jon Rahm', 'Jordan Spieth',
    ],
    canadians: new Set(['Corey Conners']),
  },
  {
    name: 'George',
    picks: [
      'Rory McIlroy', 'Tommy Fleetwood', 'Alex Noren', 'Bryson DeChambeau',
      'Tyrrell Hatton', 'Corey Conners', 'Jon Rahm', 'Sungjae Im',
    ],
    canadians: new Set(['Corey Conners']),
  },
  {
    name: 'Katie',
    picks: [
      'Scottie Scheffler', 'Matt Fitzpatrick', 'Ludvig Åberg', 'Min Woo Lee',
      'Nicolai Højgaard', 'Corey Conners', 'Jon Rahm', 'Brooks Koepka',
    ],
    canadians: new Set(['Corey Conners']),
  },
  {
    name: 'Haley',
    picks: [
      'Scottie Scheffler', 'Justin Rose', 'Russell Henley', 'Akshay Bhatia',
      'Shane Lowry', 'Jake Knapp', 'Jon Rahm', 'Corey Conners',
    ],
    canadians: new Set(['Corey Conners']),
  },
  {
    name: 'Gill',
    picks: [
      'Scottie Scheffler', 'Collin Morikawa', 'Sepp Straka', 'Min Woo Lee',
      'Sam Burns', 'Sam Stevens', 'Bubba Watson', 'Corey Conners',
    ],
    canadians: new Set(['Corey Conners']),
  },
  // Scott forgot to submit picks — his 2025 team plays on in spirit
  {
    name: 'Scott',
    picks: [
      'Scottie Scheffler', 'Collin Morikawa', 'Bryson DeChambeau', 'Sungjae Im',
      'Tony Finau', 'Corey Conners', 'Brooks Koepka', 'Will Zalatoris',
    ],
    canadians: new Set(['Corey Conners']),
    invalid:   new Set(['Tony Finau', 'Will Zalatoris']),  // not in 2026 field
    special: true,  // archived entry — shown separately at bottom
  },
];

// ─── STATE ────────────────────────────────────────────────────────────────────

let liveScores = {};   // normalizedName → { score, cut, wd, displayName, espnId, rounds }
let lastFetch  = null;
let nextFetch  = null;
let tickTimer  = null;
let roundInfo  = { currentRound: 1, roundInProgress: false, playersRemaining: 0, completedRounds: 0 };
let viewRound  = null;  // null = live cumulative; 1/2/3/4 = snapshot after that round

const REFRESH_MS = 5 * 60 * 1000;

// ─── HELPERS ─────────────────────────────────────────────────────────────────

/** Strip diacritics and lowercase for fuzzy name matching */
function norm(name) {
  return name
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function espnUrl(name, espnId) {
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  return espnId
    ? `https://www.espn.com/golf/player/_/id/${espnId}/${slug}`
    : `https://www.espn.com/golf/players`;
}

function fmtScore(score, notFound) {
  if (notFound || score === 0) return 'E';
  if (score === 50)            return '+50';
  return score > 0 ? `+${score}` : String(score);
}

function cls(score) {
  if (score < 0) return 'neg';
  if (score > 0) return 'pos';
  return 'even';
}

// ─── ESPN API ─────────────────────────────────────────────────────────────────

async function fetchESPN() {
  const url = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`ESPN HTTP ${res.status}`);
  return res.json();
}

function parseESPN(data) {
  const scores = {};
  let tournamentName   = null;
  let tournamentStatus = null;
  let currentRound     = 1;
  let roundInProgress  = false;
  let playersRemaining = 0;

  for (const event of (data.events || [])) {
    tournamentName = event.name || event.shortName || tournamentName;

    for (const comp of (event.competitions || [])) {
      tournamentStatus = comp.status?.type?.description || null;
      currentRound     = comp.status?.period || 1;
      roundInProgress  = comp.status?.type?.state === 'in';

      for (const c of (comp.competitors || [])) {
        const displayName = c.athlete?.displayName || '';
        if (!displayName) continue;

        const key = norm(displayName);

        // Cumulative score — use scoreToPar stat (includes in-progress round)
        // score.displayValue is only the latest *round* score, not the running total
        const scoreToParStat = c.statistics?.find(s => s.name === 'scoreToPar');
        const raw = (scoreToParStat?.displayValue ?? c.score?.displayValue ?? '').toString().trim();
        let score = 0;
        if (raw !== '' && raw !== 'E' && raw !== '--') {
          const n = parseInt(raw, 10);
          if (!isNaN(n)) score = n;
        }

        // Per-round scores from linescores
        // Only store rounds where a real score exists (skip '-' = not yet played)
        const rounds = {};
        for (const ls of (c.linescores || [])) {
          if (!ls.period) continue;
          const dv = (ls.displayValue || '').trim();
          if (dv === '-' || dv === '--' || dv === '') continue; // not played yet
          rounds[ls.period] = (dv === 'E') ? 0 : (parseInt(dv, 10) || 0);
        }

        // Status
        const sName  = c.status?.type?.name || '';
        const sDesc  = (c.status?.type?.description || '').toLowerCase();
        const sState = c.status?.type?.state || '';
        const cut = sName.includes('CUT') || sDesc.includes('cut') || sName === 'STATUS_ELIMINATED';
        const wd  = sName.includes('WITHDRAWN') || sDesc.includes('withdraw') || sName === 'STATUS_WD';

        if (sState === 'in') playersRemaining++;
        if (cut) score = 50;

        // Player status for indicators
        const finished  = sState === 'post' || sName === 'STATUS_FINISH';
        const playing   = sState === 'in'   || sName === 'STATUS_IN_PROGRESS';
        // scheduled = hasn't teed off yet this round

        const espnId = c.athlete?.id || null;
        scores[key] = { score, cut, wd, displayName, espnId, rounds, finished, playing };
      }
    }
  }

  // How many rounds are fully complete
  // A round is complete if it's not the in-progress round AND ≥90% of eligible players have a score
  const allPlayers = Object.values(scores);
  const eligible   = allPlayers.filter(p => !p.wd);
  let completedRounds = 0;
  for (let r = 1; r <= 4; r++) {
    if (roundInProgress && r === currentRound) break; // this round still live
    const withScore = eligible.filter(p => p.rounds[r] !== undefined).length;
    if (withScore >= eligible.length * 0.9) completedRounds = r;
    else break;
  }

  return { scores, tournamentName, tournamentStatus, currentRound, roundInProgress, playersRemaining, completedRounds };
}

// ─── SCORE LOOKUP ─────────────────────────────────────────────────────────────

function getPlayerScore(name, invalidSet, roundFilter) {
  if (invalidSet && invalidSet.has(name)) {
    return { score: 50, cut: false, invalid: true, notFound: false, espnId: null };
  }
  const data = liveScores[norm(name)];
  if (!data) return { score: 0, cut: false, invalid: false, notFound: true, espnId: null };

  if (roundFilter != null) {
    // Sum per-round scores up through roundFilter
    let sum = 0;
    for (let r = 1; r <= roundFilter; r++) sum += (data.rounds[r] || 0);
    // Cut penalty only applies if player missed cut AND we're viewing R2+ (cut is made after R2)
    const cutApplies = data.cut && roundFilter >= 2;
    return { score: cutApplies ? 50 : sum, cut: cutApplies, wd: data.wd, invalid: false, notFound: false, espnId: data.espnId, finished: data.finished, playing: data.playing };
  }

  return { score: data.score, cut: data.cut, wd: data.wd, invalid: false, notFound: false, espnId: data.espnId, finished: data.finished, playing: data.playing };
}

// ─── CALCULATE STANDINGS ─────────────────────────────────────────────────────

function calcAll(roundFilter) {
  const ranked  = [];
  const pending = [];
  const special = [];

  for (const entry of POOL) {
    if (entry.pending) { pending.push({ entry, pending: true }); continue; }

    const pickData = entry.picks.map(name => ({
      name,
      isCanadian: (entry.canadians || new Set()).has(name),
      ...getPlayerScore(name, entry.invalid, roundFilter),
    }));

    // Best 4 = lowest 4 scores (cut/invalid are +50, so naturally sink to bottom)
    const sorted  = [...pickData].sort((a, b) => a.score - b.score);
    const top4    = sorted.slice(0, 4);
    const top4Set = new Set(top4.map(p => p.name));
    const total   = top4.reduce((sum, p) => sum + p.score, 0);
    const allTotal = pickData.reduce((sum, p) => sum + p.score, 0);

    const result = {
      entry,
      total,
      allTotal,
      pickData: pickData.map(p => ({ ...p, contributing: top4Set.has(p.name) })),
      top4,
    };

    if (entry.special) { special.push(result); continue; }
    ranked.push(result);
  }

  ranked.sort((a, b) => a.total - b.total);

  // Assign tie-aware display ranks (only for active competitors)
  let i = 0;
  while (i < ranked.length) {
    let j = i;
    while (j < ranked.length && ranked[j].total === ranked[i].total) j++;
    const rankNum  = i + 1;
    const isTie    = j - i > 1;
    for (let k = i; k < j; k++) {
      ranked[k].rank        = rankNum;
      ranked[k].displayRank = isTie ? `T${rankNum}` : `${rankNum}`;
    }
    i = j;
  }

  return [...ranked, ...pending, ...special];
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function badgeClass(rank) {
  if (rank === 1) return 'gold';
  if (rank === 2) return 'silver';
  if (rank === 3) return 'bronze';
  if (rank <= 5)  return 'field';
  return '';
}

function renderLeaderboard() {
  const entries = calcAll(viewRound);
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';

  // Determine "previous" round for delta comparisons
  const { completedRounds, roundInProgress, currentRound } = roundInfo;
  const prevRound = viewRound != null ? viewRound - 1
                  : completedRounds > 0 ? completedRounds
                  : null;

  // Family member delta maps (score + rank)
  const deltaMap     = {};  // name → score delta
  const rankDeltaMap = {};  // name → rank delta (negative = moved up)
  let prevEntries = null;
  if (prevRound != null && prevRound >= 1) {
    prevEntries = calcAll(prevRound);
    const prevActive  = prevEntries.filter(r => !r.pending && !r.entry.special);
    const prevByName  = Object.fromEntries(prevActive.map(r => [r.entry.name, r]));
    const currActive  = entries.filter(r => !r.pending && !r.entry.special);
    for (const r of currActive) {
      const prev = prevByName[r.entry.name];
      if (!prev) continue;
      deltaMap[r.entry.name]     = r.total - prev.total;
      rankDeltaMap[r.entry.name] = r.rank  - prev.rank;   // positive = moved down (worse)
    }
  }

  // Per-player score delta map: normalizedName → score delta vs prevRound
  const playerDeltaMap = {};
  if (prevRound != null && prevRound >= 1) {
    for (const [key, data] of Object.entries(liveScores)) {
      // Current score: live total
      const curScore = data.cut ? 50 : data.score;
      // Prev score: sum of rounds up to prevRound
      let prevScore = 0;
      for (let rr = 1; rr <= prevRound; rr++) prevScore += (data.rounds[rr] || 0);
      if (data.cut && prevRound >= 2) prevScore = 50;
      playerDeltaMap[key] = curScore - prevScore;
    }
  }

  let shownSpecialDivider = false;

  for (const r of entries) {
    // Insert divider before the special archived section
    if (r.entry && r.entry.special && !shownSpecialDivider) {
      shownSpecialDivider = true;
      const divider = document.createElement('div');
      divider.style.cssText = 'text-align:center;margin:22px 0 10px;font-size:.7rem;color:#bbb;letter-spacing:1.5px;text-transform:uppercase;';
      divider.innerHTML = '— Commissioner\'s Archive · Scott\'s 2025 Picks —';
      lb.appendChild(divider);
    }

    const card = document.createElement('div');
    card.className = 'entry-card';

    if (r.pending) {
      card.classList.add('pending-card');
      card.innerHTML = `
        <div class="card-header" style="cursor:default">
          <div class="rank-badge" style="background:#ddd;color:#bbb;font-size:.95rem">?</div>
          <div class="card-name" style="color:#bbb">${r.entry.name}</div>
          <div style="font-size:.75rem;color:#ccc;font-style:italic">Picks not yet received</div>
        </div>`;
      lb.appendChild(card);
      continue;
    }

    if (r.entry.special) {
      card.classList.add('pending-card');
    }

    const totalFmt   = fmtScore(r.total, false);
    const totalCls   = cls(r.total);
    const all8Fmt    = fmtScore(r.allTotal, false);
    const all8Cls    = cls(r.allTotal);

    // Delta badge
    let deltaBadgeHtml = '';
    if (!r.entry.special && r.entry.name in deltaMap) {
      const d = deltaMap[r.entry.name];
      const dLabel = d === 0 ? '=' : (d > 0 ? `+${d}` : String(d));
      const dCls   = d < 0 ? 'better' : d > 0 ? 'worse' : 'same';
      deltaBadgeHtml = `<span class="delta-badge ${dCls}" title="Change vs. last completed round">${dLabel} today</span>`;
    }

    // Chips for best-4 preview (with player delta + status dot)
    const chipsHtml = r.top4.map(p => {
      const chipCls   = p.invalid ? 'invalid-chip' : p.cut ? 'cut-chip' : '';
      const flag      = p.isCanadian ? '🇨🇦 ' : '';
      const lastName  = p.name.split(' ').slice(-1)[0];
      const href      = espnUrl(p.name, p.espnId);
      const dotCls    = p.cut ? 'finished' : p.playing ? 'playing' : p.finished ? 'finished' : 'waiting';
      const dotHtml   = viewRound == null ? `<span class="status-dot ${dotCls}" title="${dotCls}"></span>` : '';
      const pd        = playerDeltaMap[norm(p.name)];
      let pdHtml = '';
      if (pd !== undefined && viewRound == null && prevRound != null) {
        const pdLbl = pd === 0 ? '=' : (pd > 0 ? `+${pd}` : String(pd));
        const pdCls = pd < 0 ? 'better' : pd > 0 ? 'worse' : 'same';
        pdHtml = `<span class="pdelta ${pdCls}">${pdLbl}</span>`;
      }
      return `<a class="chip ${chipCls} player-link" href="${href}" target="_blank" rel="noopener" style="gap:5px">${dotHtml}${flag}${lastName} <span class="cscore ${cls(p.score)}">${fmtScore(p.score, p.notFound)}</span>${pdHtml}</a>`;
    }).join('');

    // All-picks detail grid (with player delta + status dot)
    const picksHtml = r.pickData.map(p => {
      let rowCls = '', tag = '';
      if (p.invalid) {
        rowCls = 'invalid-row';
        tag    = '<span class="tag invalid-tag">not in field</span>';
      } else if (p.cut) {
        rowCls = 'cut-row';
        tag    = '<span class="tag cut-tag">cut</span>';
      } else if (p.contributing) {
        rowCls = 'top4-row';
        tag    = '<span class="tag top4-tag">top 4</span>';
      }
      const flag    = p.isCanadian ? '🇨🇦 ' : '';
      const href    = espnUrl(p.name, p.espnId);
      const dotCls  = p.cut ? 'finished' : p.playing ? 'playing' : p.finished ? 'finished' : 'waiting';
      const dotHtml = viewRound == null && !p.invalid
        ? `<span class="status-dot ${dotCls}" title="${p.playing ? 'On course' : p.finished ? 'Round done' : 'Not yet teed off'}"></span>`
        : '';
      const pd    = playerDeltaMap[norm(p.name)];
      let pdHtml  = '';
      if (pd !== undefined && viewRound == null && prevRound != null && !p.invalid) {
        const pdLbl = pd === 0 ? '=' : (pd > 0 ? `+${pd}` : String(pd));
        const pdCls = pd < 0 ? 'better' : pd > 0 ? 'worse' : 'same';
        pdHtml = `<span class="pdelta ${pdCls}" style="font-size:.75rem;margin-left:4px">${pdLbl} today</span>`;
      }
      return `
        <div class="pick-row ${rowCls}">
          <span style="display:flex;align-items:center;gap:5px;min-width:0;flex:1">
            ${dotHtml}
            <a class="pick-name player-link" href="${href}" target="_blank" rel="noopener" style="min-width:0">${flag}${p.name}</a>
          </span>
          <span class="pick-right">
            ${pdHtml}
            ${tag}
            <span class="pick-score-val ${cls(p.score)}">${fmtScore(p.score, p.notFound)}</span>
          </span>
        </div>`;
    }).join('');

    let rankDeltaHtml = '';
    if (!r.entry.special && r.entry.name in rankDeltaMap) {
      const rd = rankDeltaMap[r.entry.name];
      if (rd < 0)      rankDeltaHtml = `<div class="rank-delta up">▲${Math.abs(rd)}</div>`;
      else if (rd > 0) rankDeltaHtml = `<div class="rank-delta down">▼${rd}</div>`;
      else             rankDeltaHtml = `<div class="rank-delta flat">—</div>`;
    }
    const rankBadge = r.entry.special
      ? `<div style="flex-shrink:0;text-align:center"><div class="rank-badge" style="background:#ddd;color:#bbb;font-size:.95rem">📜</div></div>`
      : `<div style="flex-shrink:0;text-align:center"><div class="rank-badge ${badgeClass(r.rank)}">${r.displayRank}</div>${rankDeltaHtml}</div>`;

    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(this)">
        ${rankBadge}
        <div class="card-name">${r.entry.name}</div>
        ${deltaBadgeHtml}
        <div class="score-stack">
          <div class="card-total ${totalCls}">${totalFmt}</div>
          <div class="all8-label">all 8: <span class="all8-val ${all8Cls}">${all8Fmt}</span></div>
        </div>
        <div class="chevron">▼</div>
      </div>
      <div class="chips-row">${chipsHtml}</div>
      <div class="card-detail">
        <div class="detail-label">All 8 Picks</div>
        <div class="picks-grid">${picksHtml}</div>
      </div>`;

    lb.appendChild(card);
  }
}

function toggleCard(headerEl) {
  headerEl.closest('.entry-card').classList.toggle('open');
}

function expandAll()  { document.querySelectorAll('.entry-card:not(.pending-card)').forEach(c => c.classList.add('open')); }
function collapseAll(){ document.querySelectorAll('.entry-card').forEach(c => c.classList.remove('open')); }

// ─── ROUND TABS ───────────────────────────────────────────────────────────────

function setRoundView(r) {
  viewRound = r;
  renderRoundTabs();
  renderLeaderboard();
}

function renderRoundTabs() {
  const { currentRound, roundInProgress, completedRounds } = roundInfo;
  const container = document.getElementById('round-tabs');

  // Only show tabs when there's more than one round of data
  if (completedRounds < 1) { container.style.display = 'none'; return; }
  container.style.display = 'flex';

  const tabs = [];

  // One tab per completed round
  for (let r = 1; r <= completedRounds; r++) {
    tabs.push({ label: `After R${r}`, value: r });
  }

  // Live tab for current round if in progress, or final tab
  if (roundInProgress) {
    tabs.push({ label: `R${currentRound} (Live)`, value: null, live: true });
  } else if (currentRound > completedRounds) {
    // Current round just finished but completedRounds may lag — show Live anyway
    tabs.push({ label: currentRound === 4 ? 'Final' : `R${currentRound} (Live)`, value: null, live: currentRound < 4 });
  } else {
    tabs.push({ label: 'Live', value: null });
  }

  container.innerHTML = tabs.map(t => {
    const active = (viewRound === t.value) ? 'active' : '';
    const dot = t.live ? '<span class="live-dot"></span>' : '';
    return `<button class="round-tab ${active}" onclick="setRoundView(${t.value})">${dot}${t.label}</button>`;
  }).join('');
}

// ─── EXPORT CSV ───────────────────────────────────────────────────────────────

function exportCSV() {
  const entries = calcAll(viewRound).filter(r => !r.pending);
  const label = viewRound ? `R${viewRound}` : 'Live';

  const rows = [
    ['Rank', 'Name', 'Best 4', 'All 8',
     'Pick 1', 'Score 1', 'Pick 2', 'Score 2', 'Pick 3', 'Score 3', 'Pick 4', 'Score 4',
     'Pick 5', 'Score 5', 'Pick 6', 'Score 6', 'Pick 7', 'Score 7', 'Pick 8', 'Score 8'],
  ];

  for (const r of entries) {
    const row = [
      r.displayRank || '—',
      r.entry.name,
      fmtScore(r.total, false),
      fmtScore(r.allTotal, false),
    ];
    for (const p of r.pickData) {
      row.push(p.name, fmtScore(p.score, p.notFound));
    }
    rows.push(row);
  }

  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `hammy-masters-${label.toLowerCase()}.csv`;
  a.click();
}

// ─── REFRESH ──────────────────────────────────────────────────────────────────

function setBanners(html) { document.getElementById('banners').innerHTML = html; }
function setStatus(txt)   { document.getElementById('status-text').textContent = txt; }

function startTick() {
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(() => {
    if (!lastFetch) return;
    const rem = Math.max(0, nextFetch - Date.now());
    const m   = Math.floor(rem / 60000);
    const s   = Math.floor((rem % 60000) / 1000).toString().padStart(2, '0');
    setStatus(`Updated ${lastFetch.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} · Next in ${m}:${s}`);
  }, 1000);
}

async function doRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ …';

  try {
    const raw = await fetchESPN();
    const { scores, tournamentName, tournamentStatus,
            currentRound, roundInProgress, playersRemaining, completedRounds } = parseESPN(raw);
    liveScores = scores;
    roundInfo  = { currentRound, roundInProgress, playersRemaining, completedRounds };
    lastFetch  = new Date();
    nextFetch  = Date.now() + REFRESH_MS;

    // If viewing a completed round that no longer exists, reset to live
    if (viewRound !== null && viewRound > completedRounds) viewRound = null;

    // Header labels
    const label = [tournamentName, tournamentStatus].filter(Boolean).join(' · ');
    document.getElementById('tournament-label').textContent = label || 'Masters Tournament 2026';

    // Banners
    const isMasters = (tournamentName || '').toLowerCase().includes('master');
    const banners = [];
    if (tournamentName && !isMasters) {
      banners.push(`<div class="banner warning">⚠️ ESPN is currently showing <strong>${tournamentName}</strong>, not The Masters.</div>`);
    }
    if (roundInProgress && playersRemaining > 0) {
      banners.push(`<div class="banner info">🏌️ Round ${currentRound} in progress — ${playersRemaining} player${playersRemaining !== 1 ? 's' : ''} still on course. Scores updating live.</div>`);
    }
    setBanners(banners.join(''));

    renderRoundTabs();
    renderLeaderboard();
    startTick();
  } catch (err) {
    console.error('ESPN fetch failed:', err);
    const hadData = Object.keys(liveScores).length > 0;
    setBanners(`<div class="banner error">⚠️ Couldn't reach ESPN API. ${hadData ? 'Showing last known scores.' : 'No data yet — try again shortly.'} <small style="opacity:.7">${err.message}</small></div>`);
    if (hadData) renderLeaderboard();
    else document.getElementById('leaderboard').innerHTML =
      `<div class="loading-state" style="color:var(--red)">Failed to load.<br><small>Check your connection and hit Refresh.</small></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

doRefresh();
setInterval(doRefresh, REFRESH_MS);
</script>
