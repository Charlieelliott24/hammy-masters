// ─── CHART ────────────────────────────────────────────────────────────────────

const CHART_COLORS = [
  '#c9a227','#2d7d46','#e05c3a','#4a90d9','#9b59b6',
  '#e67e22','#1abc9c','#e91e63','#607d8b','#795548',
];

let chartMode    = 'rank';
let chartHovered = null;

function toggleChart() {
  const p = document.getElementById('chart-panel');
  p.classList.toggle('open');
  localStorage.setItem('chartOpen', p.classList.contains('open') ? '1' : '0');
}

function setChartMode(mode, btn) {
  chartMode = mode;
  document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

/** Catmull-Rom spline → smooth SVG cubic bezier path */
function smoothPath(pts) {
  if (pts.length === 1) return `M${pts[0].x},${pts[0].y}`;
  let d = `M${pts[0].x},${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(pts.length - 1, i + 2)];
    const cp1x = (p1.x + (p2.x - p0.x) / 6).toFixed(1);
    const cp1y = (p1.y + (p2.y - p0.y) / 6).toFixed(1);
    const cp2x = (p2.x - (p3.x - p1.x) / 6).toFixed(1);
    const cp2y = (p2.y - (p3.y - p1.y) / 6).toFixed(1);
    d += ` C${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }
  return d;
}

function renderChart() {
  const panel = document.getElementById('chart-panel');
  const { completedRounds, roundInProgress, currentRound } = roundInfo;
  if (completedRounds < 1) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';

  // Columns: one per completed round + live column if round in progress
  const cols = [];
  for (let r = 1; r <= completedRounds; r++) cols.push({ label: `R${r}`, round: r, live: false });
  if (roundInProgress || currentRound > completedRounds) {
    cols.push({ label: currentRound === 4 ? 'Final' : `R${currentRound}`, round: null, live: currentRound < 4 });
  }
  const nCols = cols.length;

  const active = POOL.filter(e => !e.pending && !e.special);
  const nPeople = active.length;

  // Compute values for each column
  const colCalc = cols.map(col => {
    const res = {};
    calcAll(col.round).filter(r => !r.pending && !r.entry.special).forEach(r => { res[r.entry.name] = r; });
    return res;
  });

  const series = active.map((entry, i) => {
    const pts = cols.map((col, ci) => {
      const r = colCalc[ci][entry.name];
      return r ? { ci, val: chartMode === 'rank' ? r.rank : r.total } : null;
    });
    return { name: entry.name, pts, color: CHART_COLORS[i % CHART_COLORS.length], idx: i };
  });

  // Layout
  const wrap      = document.getElementById('chart-svg-wrap');
  const W         = Math.max(300, Math.min(700, (wrap.offsetWidth || 640) - 4));
  const H         = 230;
  const PAD       = { top: 18, right: 86, bottom: 34, left: 38 };
  const iW        = W - PAD.left - PAD.right;
  const iH        = H - PAD.top  - PAD.bottom;
  const xOf       = ci => PAD.left + (nCols > 1 ? (ci / (nCols - 1)) * iW : iW / 2);

  // Y scale with a little padding so lines don't kiss the edges
  let yMin, yMax;
  if (chartMode === 'rank') {
    yMin = 1; yMax = nPeople;
  } else {
    const vals = series.flatMap(s => s.pts.filter(Boolean).map(p => p.val));
    yMin = Math.min(...vals); yMax = Math.max(...vals);
    if (yMin === yMax) { yMin -= 2; yMax += 2; }
  }
  // Lower value = better (rank 1 better than rank 8; score -10 better than +5)
  // Both should plot at TOP of chart → use ascending scale: yMin → top, yMax → bottom
  const yOf = v => {
    const t = (yMax === yMin) ? 0.5 : (v - yMin) / (yMax - yMin);
    return Math.max(PAD.top + 2, Math.min(PAD.top + iH - 2, PAD.top + t * iH));
  };

  // ── Build SVG ──────────────────────────────────────────────────────────────
  // Defs: gradient fills per series
  let defs = '<defs>';
  series.forEach((s, i) => {
    defs += `<linearGradient id="cg${i}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${s.color}" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="${s.color}" stop-opacity="0.01"/>
    </linearGradient>`;
  });
  defs += '</defs>';

  // Grid
  let grid = '';
  const nTicks = Math.min(nPeople, chartMode === 'rank' ? nPeople : 6);
  for (let i = 0; i <= nTicks; i++) {
    const v   = yMin + (i / nTicks) * (yMax - yMin);
    const y   = yOf(v);
    const lbl = chartMode === 'rank' ? Math.round(v) : fmtScore(Math.round(v), false);
    grid += `<line x1="${PAD.left}" y1="${y.toFixed(1)}" x2="${W - PAD.right}" y2="${y.toFixed(1)}" stroke="#ebebeb" stroke-width="1"/>`;
    grid += `<text x="${PAD.left - 6}" y="${(y + 3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#c0c0c0">${lbl}</text>`;
  }
  // X axis
  cols.forEach((col, ci) => {
    const x = xOf(ci);
    grid += `<line x1="${x.toFixed(1)}" y1="${PAD.top}" x2="${x.toFixed(1)}" y2="${H - PAD.bottom}" stroke="#f2f2f2" stroke-width="1"/>`;
    const color = col.live ? '#e05c3a' : '#b0b0b0';
    const weight = col.live ? '700' : '400';
    grid += `<text x="${x.toFixed(1)}" y="${H - 10}" text-anchor="middle" font-size="10" fill="${color}" font-weight="${weight}">${col.label}${col.live ? ' ●' : ''}</text>`;
  });

  // Series: areas → lines → hit zones → dots (layered so dots are always on top)
  let areas = '', lines = '', hits = '', dotsLayer = '';

  // Compute end labels then de-collide
  const endLabels = [];

  series.forEach((s, si) => {
    const validPts = s.pts
      .map((p, ci) => p ? { x: xOf(ci), y: yOf(p.val), val: p.val, ci } : null)
      .filter(Boolean);
    if (!validPts.length) return;

    const linePath = smoothPath(validPts);

    // Area fill — only in score mode (fills toward worse scores = bottom; meaningful)
    if (validPts.length >= 2 && chartMode === 'score') {
      const bottom = H - PAD.bottom;
      const fill = linePath + ` L${validPts[validPts.length-1].x.toFixed(1)},${bottom} L${validPts[0].x.toFixed(1)},${bottom} Z`;
      areas += `<path d="${fill}" fill="url(#cg${si})" class="c-area" data-si="${si}" pointer-events="none"/>`;
    }

    // Line
    lines += `<path d="${linePath}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="c-line" data-si="${si}" pointer-events="none"/>`;

    // Invisible wide hit zone along the line
    if (validPts.length >= 2) {
      hits += `<path d="${linePath}" fill="none" stroke="transparent" stroke-width="20" class="c-hit" data-si="${si}" style="cursor:pointer"/>`;
    }

    // Dots + tooltip anchors
    validPts.forEach(pt => {
      const roundLabel = cols[pt.ci].label;
      const valLabel   = chartMode === 'rank' ? `#${pt.val}` : fmtScore(pt.val, false);
      const tip        = `${s.name} · ${roundLabel}: ${valLabel}`.replace(/'/g, '&#39;');
      dotsLayer += `<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="5.5" fill="${s.color}" stroke="#fff" stroke-width="2" class="c-dot" data-si="${si}" data-tip="${tip}" style="cursor:pointer"/>`;
      // Rank number inside dot
      if (chartMode === 'rank' && pt.val <= 9) {
        dotsLayer += `<text x="${pt.x.toFixed(1)}" y="${(pt.y + 3.8).toFixed(1)}" text-anchor="middle" font-size="7.5" font-weight="800" fill="#fff" pointer-events="none">${pt.val}</text>`;
      }
    });

    // End label info
    const last = validPts[validPts.length - 1];
    const valLabel = chartMode === 'rank' ? `#${last.val}` : fmtScore(last.val, false);
    endLabels.push({ y: last.y, x: last.x, name: s.name, val: valLabel, color: s.color, si });
  });

  // De-collide labels: sort by y, enforce 13px minimum gap
  endLabels.sort((a, b) => a.y - b.y);
  for (let i = 1; i < endLabels.length; i++) {
    if (endLabels[i].y < endLabels[i-1].y + 13) endLabels[i].y = endLabels[i-1].y + 13;
  }
  // If any label was pushed below chart bottom, nudge upward from the bottom
  for (let i = endLabels.length - 2; i >= 0; i--) {
    if (endLabels[i+1].y < endLabels[i].y + 13) continue;
  }

  // Show name only when we have >1 column (1 round = all labels at same x, names help distinguish)
  // After 4 rounds show short first names; during just 1 round show full names
  let labelsHtml = endLabels.map(el => {
    const firstName = el.name.split(' ')[0];
    const text = nCols === 1 ? `${el.name} ${el.val}` : `${firstName} ${el.val}`;
    return `<text x="${(el.x + 10).toFixed(1)}" y="${(el.y + 4).toFixed(1)}" font-size="10.5" font-weight="700" fill="${el.color}" class="c-label" data-si="${el.si}">${text}</text>`;
  }).join('');

  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:visible;display:block">
    ${defs}
    <g>${grid}</g>
    <g>${areas}</g>
    <g>${lines}</g>
    <g>${hits}</g>
    <g>${dotsLayer}</g>
    <g>${labelsHtml}</g>
  </svg>`;

  wrap.innerHTML = svgStr;

  // Legend
  document.getElementById('chart-legend').innerHTML = series.map((s, si) =>
    `<div class="chart-legend-item" data-si="${si}">
       <div class="chart-legend-swatch" style="background:${s.color}"></div>
       <span style="font-size:.75rem">${s.name}</span>
     </div>`
  ).join('');

  attachChartEvents(series.length);
}

function attachChartEvents(nSeries) {
  const svg = document.querySelector('#chart-svg-wrap svg');
  if (!svg) return;
  const tip = document.getElementById('chart-tooltip');

  function highlight(si) {
    chartHovered = si;
    const dimOpacity  = '0.08';
    const dimStroke   = '1.5';
    const fullOpacity = '1';
    const fullStroke  = '3';

    svg.querySelectorAll('.c-line').forEach(el => {
      const match = si === null || +el.dataset.si === si;
      el.style.opacity     = match ? fullOpacity : dimOpacity;
      el.style.strokeWidth = (si !== null && match) ? fullStroke : '2.5';
    });
    svg.querySelectorAll('.c-area').forEach(el => {
      el.style.opacity = (si === null || +el.dataset.si === si) ? '1' : dimOpacity;
    });
    svg.querySelectorAll('.c-dot').forEach(el => {
      const match = si === null || +el.dataset.si === si;
      el.style.opacity = match ? fullOpacity : dimOpacity;
      el.setAttribute('r', (si !== null && match) ? '7' : '5.5');
    });
    svg.querySelectorAll('.c-label').forEach(el => {
      const match = si === null || +el.dataset.si === si;
      el.style.opacity   = match ? fullOpacity : dimOpacity;
      el.style.fontSize  = (si !== null && match) ? '12px' : '10.5px';
    });
    document.querySelectorAll('#chart-legend .chart-legend-item').forEach(el => {
      el.style.opacity = (si === null || +el.dataset.si === si) ? '1' : '0.35';
    });
  }

  // Hit zones: highlight on hover (no tooltip — tooltips are on dots)
  svg.querySelectorAll('.c-hit').forEach(el => {
    el.addEventListener('mouseenter', () => highlight(+el.dataset.si));
    el.addEventListener('mouseleave', () => { if (chartHovered !== null) highlight(null); });
  });

  // Dots: highlight + show tooltip
  svg.querySelectorAll('.c-dot').forEach(el => {
    el.addEventListener('mouseenter', e => {
      highlight(+el.dataset.si);
      tip.innerHTML = el.dataset.tip;
      tip.style.display = 'block';
    });
    el.addEventListener('mousemove', e => {
      tip.style.left = (e.clientX + 16) + 'px';
      tip.style.top  = (e.clientY - 42) + 'px';
    });
    el.addEventListener('mouseleave', () => {
      highlight(null);
      tip.style.display = 'none';
    });
  });

  // Legend: hover to highlight
  document.querySelectorAll('#chart-legend .chart-legend-item').forEach(el => {
    el.addEventListener('mouseenter', () => highlight(+el.dataset.si));
    el.addEventListener('mouseleave', () => highlight(null));
  });
}

// ─── STROKE BY STROKE ─────────────────────────────────────────────────────────

async function fetchHoleScores() {
  if (!currentEventId) return;
  // Invalidate cache if tournament changed
  if (holeEventId !== currentEventId) { holeScores = {}; holeEventId = currentEventId; }

  const active = POOL.filter(e => !e.pending && !e.special);
  const toFetch = [];
  const seen    = new Set();
  for (const entry of active) {
    for (const name of entry.picks) {
      const data = liveScores[norm(name)];
      if (!data?.espnId || seen.has(data.espnId)) continue;
      seen.add(data.espnId);
      if (!holeScores[data.espnId]) toFetch.push({ espnId: data.espnId, displayName: data.displayName });
    }
  }
  if (!toFetch.length) return;

  await Promise.allSettled(toFetch.map(async ({ espnId, displayName }) => {
    try {
      const url = `https://sports.core.api.espn.com/v2/sports/golf/leagues/pga/events/${currentEventId}/competitions/${currentEventId}/competitors/${espnId}/linescores`;
      const res = await fetch(url);
      if (!res.ok) return;
      const d = await res.json();
      const rounds = {};
      for (const item of (d.items || [])) {
        const rNum  = item.period; // 1/2/3/4
        const holes = (item.linescores || [])
          .filter(ls => ls.value !== undefined && ls.par !== undefined)
          .map(ls => ({ hole: ls.period, value: ls.value, par: ls.par, scoreType: (ls.scoreType?.name || 'PAR').toUpperCase() }))
          .sort((a, b) => a.hole - b.hole);
        if (holes.length) rounds[rNum] = holes;
      }
      holeScores[espnId] = { rounds };
    } catch { /* silently skip on CORS or network error */ }
  }));
}

function holeColor(scoreType) {
  if (!scoreType) return null;
  const st = scoreType.toUpperCase();
  if (st === 'EAGLE' || st === 'DOUBLE_EAGLE' || st === 'HOLE_IN_ONE') return '#c9a227'; // gold
  if (st === 'BIRDIE') return '#1a7f3a';  // green
  if (st === 'BOGEY')  return '#e05c3a';  // orange-red
  if (st.includes('BOGEY')) return '#c0392b'; // double bogey+
  return null; // par → use series color
}

function toggleStroke() {
  const p = document.getElementById('stroke-panel');
  p.classList.toggle('open');
  localStorage.setItem('strokeOpen', p.classList.contains('open') ? '1' : '0');
  if (p.classList.contains('open')) renderStrokeByStroke();
}

function setStrokeView(view, btn) {
  strokeView = view;
  document.querySelectorAll('#stroke-view-tabs .chart-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  // Reset filter to 'all' when switching views for a clean slate
  strokeFilter = 'all';
  document.querySelectorAll('#stroke-filter-bar .chart-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  renderStrokeByStroke();
}

function setStrokeRound(r, btn) {
  strokeRound = r;
  document.querySelectorAll('#stroke-round-tabs .chart-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderStrokeByStroke();
}

function setStrokeFilter(f, btn) {
  strokeFilter = f;
  document.querySelectorAll('#stroke-filter-bar .chart-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderStrokeByStroke();
}

function renderStrokeRoundTabs() {
  const { completedRounds, roundInProgress, currentRound } = roundInfo;
  const container = document.getElementById('stroke-round-tabs');
  const rounds = [];
  for (let r = 1; r <= completedRounds; r++) rounds.push({ label: `R${r}`, val: r, live: false });
  if (roundInProgress) rounds.push({ label: `R${currentRound}`, val: currentRound, live: true });
  if (!rounds.length) { container.innerHTML = ''; return; }
  // Add "All Rounds" option when more than 1 round exists
  if (rounds.length > 1) rounds.push({ label: 'All Rounds', val: 'all', live: false });
  // Default: last round (or keep existing)
  const validVals = rounds.map(r => r.val);
  if (strokeRound === null || !validVals.includes(strokeRound)) {
    strokeRound = rounds[rounds.length <= 2 ? rounds.length - 1 : rounds.length - 2].val; // default to latest round, not "All"
  }
  container.innerHTML = rounds.map(r => {
    const valStr = r.val === 'all' ? "'all'" : r.val;
    return `<button class="chart-tab ${strokeRound === r.val ? 'active' : ''}" ${r.live ? 'style="color:#e05c3a"' : ''} onclick="setStrokeRound(${valStr},this)">${r.label}${r.live ? ' ●' : ''}</button>`;
  }).join('');
}

function renderStrokeByStroke() {
  const panel     = document.getElementById('stroke-panel');
  const wrap      = document.getElementById('stroke-svg-wrap');
  const legend    = document.getElementById('stroke-legend');
  const filterBar = document.getElementById('stroke-filter-bar');
  const typeLeg   = document.getElementById('stroke-type-legend');
  const { completedRounds, roundInProgress, currentRound } = roundInfo;
  const maxRound  = roundInProgress ? currentRound : completedRounds;
  if (maxRound < 1 || !Object.keys(liveScores).length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  renderStrokeRoundTabs();

  const isAll    = strokeRound === 'all';
  const numRounds = isAll ? maxRound : null;
  const round    = isAll ? null : (strokeRound || 1);
  const active   = POOL.filter(e => !e.pending && !e.special);

  if (strokeView === 'golfers') {
    filterBar.style.display = 'flex';
    // Collect all unique picks, sorted by current score for filter
    const seen = new Set();
    const picksArr = [];
    active.forEach(entry => {
      entry.picks.forEach(name => {
        const data = liveScores[norm(name)];
        if (!data?.espnId || seen.has(data.espnId)) return;
        seen.add(data.espnId);
        picksArr.push({ espnId: data.espnId, displayName: data.displayName, score: data.cut ? 50 : (data.score ?? 0) });
      });
    });
    picksArr.sort((a, b) => a.score - b.score);
    const limit    = strokeFilter === 'top5' ? 5 : strokeFilter === 'top10' ? 10 : Infinity;
    const filtered = picksArr.slice(0, limit);

    const series = [];
    filtered.forEach(({ espnId, displayName }, idx) => {
      const hs = holeScores[espnId];
      if (!hs) return;
      let pts;
      if (isAll) {
        pts = [{ x: 0, y: 0, holeNum: 0, round: 0, scoreType: null }];
        let cum = 0, xPos = 0;
        for (let r = 1; r <= numRounds; r++) {
          for (const h of (hs.rounds[r] || [])) {
            xPos++; cum += (h.value - h.par);
            pts.push({ x: xPos, y: cum, holeNum: h.hole, round: r, scoreType: h.scoreType, value: h.value, par: h.par });
          }
        }
        if (!xPos) return;
      } else {
        if (!hs.rounds?.[round]) return;
        pts = [{ x: 0, y: 0, holeNum: 0, round, scoreType: null }];
        let cum = 0;
        for (const h of hs.rounds[round]) {
          cum += (h.value - h.par);
          pts.push({ x: h.hole, y: cum, holeNum: h.hole, round, scoreType: h.scoreType, value: h.value, par: h.par });
        }
      }
      const color = `hsl(${Math.round(idx * 137.508 % 360)},62%,42%)`;
      series.push({ name: displayName.split(' ').slice(-1)[0], fullName: displayName, pts, color, idx, isGolfer: true });
    });

    // Score type dot legend
    typeLeg.style.display = 'flex';
    typeLeg.innerHTML = [
      { color: '#c9a227', label: 'Eagle' }, { color: '#1a7f3a', label: 'Birdie' },
      { color: '#888',    label: 'Par' },   { color: '#e05c3a', label: 'Bogey' },
      { color: '#c0392b', label: 'Double+' },
    ].map(t => `<span style="display:flex;align-items:center;gap:4px;font-size:.67rem;color:#999">
      <span style="width:8px;height:8px;border-radius:50%;background:${t.color};display:inline-block;flex-shrink:0"></span>${t.label}</span>`).join('');

    if (!series.length) {
      wrap.innerHTML = '<div style="text-align:center;padding:28px 0;color:#bbb;font-size:.82rem">Hole-by-hole data loading…</div>';
      legend.innerHTML = ''; return;
    }
    renderHoleChart(wrap, legend, series, { multiRound: isAll, numRounds: isAll ? numRounds : 1, singleRound: round });

  } else {
    // Family tab — best-4 cumulative per hole
    filterBar.style.display = 'none';
    typeLeg.style.display   = 'none';
    const series = [];
    active.forEach((entry, i) => {
      const getHoles = r => entry.picks
        .filter(n => !(entry.invalid?.has(n)))
        .map(n => { const d = liveScores[norm(n)]; return d?.espnId ? holeScores[d.espnId]?.rounds?.[r] || null : null; })
        .filter(Boolean);
      let pts;
      if (isAll) {
        pts = [{ x: 0, y: 0, holeNum: 0, round: 0 }];
        let xPos = 0, base = 0;
        for (let r = 1; r <= numRounds; r++) {
          const ph = getHoles(r);
          if (!ph.length) { xPos += 18; continue; }
          const maxH = Math.max(...ph.map(h => h.length));
          for (let h = 1; h <= maxH; h++) {
            xPos++;
            const c = ph.map(holes => holes.filter(hh => hh.hole <= h).reduce((s, hh) => s + hh.value - hh.par, 0));
            c.sort((a, b) => a - b);
            pts.push({ x: xPos, y: base + c.slice(0, 4).reduce((s, v) => s + v, 0), holeNum: h, round: r });
          }
          const fc = ph.map(holes => holes.reduce((s, hh) => s + hh.value - hh.par, 0));
          fc.sort((a, b) => a - b);
          base += fc.slice(0, 4).reduce((s, v) => s + v, 0);
        }
        if (!xPos) return;
      } else {
        const ph = getHoles(round);
        if (!ph.length) return;
        const maxH = Math.max(...ph.map(h => h.length));
        if (!maxH) return;
        pts = [{ x: 0, y: 0, holeNum: 0, round }];
        for (let h = 1; h <= maxH; h++) {
          const c = ph.map(holes => holes.filter(hh => hh.hole <= h).reduce((s, hh) => s + hh.value - hh.par, 0));
          c.sort((a, b) => a - b);
          pts.push({ x: h, y: c.slice(0, 4).reduce((s, v) => s + v, 0), holeNum: h, round });
        }
      }
      series.push({ name: entry.name, fullName: entry.name, pts, color: CHART_COLORS[i % CHART_COLORS.length], idx: i, isGolfer: false });
    });

    if (!series.length) {
      wrap.innerHTML = '<div style="text-align:center;padding:28px 0;color:#bbb;font-size:.82rem">Hole-by-hole data loading…</div>';
      legend.innerHTML = ''; return;
    }
    renderHoleChart(wrap, legend, series, { multiRound: isAll, numRounds: isAll ? numRounds : 1, singleRound: round });
  }
}

function renderHoleChart(wrap, legendEl, series, opts) {
  const { multiRound, numRounds, singleRound } = opts;
  // In multi-round mode x goes from 0..numRounds*18; in single round 0..18
  const maxX = multiRound ? Math.max(...series.flatMap(s => s.pts.map(p => p.x))) : 18;

  const W   = Math.max(320, Math.min(multiRound ? 820 : 700, (wrap.offsetWidth || 660) - 4));
  const H   = 250;
  const PAD = { top: multiRound ? 28 : 18, right: 72, bottom: 36, left: 36 };
  const iW  = W - PAD.left - PAD.right;
  const iH  = H - PAD.top  - PAD.bottom;
  const xOf = xi => PAD.left + (xi / maxX) * iW;

  const allY = series.flatMap(s => s.pts.map(p => p.y));
  let yMin = Math.min(...allY);
  let yMax = Math.max(...allY);
  const yPad = Math.max(1, (yMax - yMin) * 0.12);
  yMin -= yPad; yMax += yPad;
  const yOf = v => PAD.top + ((v - yMin) / (yMax - yMin || 1)) * iH;

  // Defs
  let defs = '<defs>';
  series.forEach((s, i) => {
    defs += `<linearGradient id="hg${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity="0.12"/><stop offset="100%" stop-color="${s.color}" stop-opacity="0"/></linearGradient>`;
  });
  defs += '</defs>';

  // Grid
  let grid = '';
  // Par (E) line
  const y0 = yOf(0);
  grid += `<line x1="${PAD.left}" y1="${y0.toFixed(1)}" x2="${W - PAD.right}" y2="${y0.toFixed(1)}" stroke="#b0b0b0" stroke-width="1" stroke-dasharray="4,3"/>`;
  grid += `<text x="${PAD.left - 4}" y="${(y0 + 4).toFixed(1)}" text-anchor="end" font-size="9" fill="#999" font-weight="700">E</text>`;
  // Y ticks
  for (let v = Math.ceil(yMin); v <= Math.floor(yMax); v += 2) {
    if (Math.abs(v) < 0.5 || v < yMin || v > yMax) continue;
    const y = yOf(v);
    grid += `<line x1="${PAD.left}" y1="${y.toFixed(1)}" x2="${W - PAD.right}" y2="${y.toFixed(1)}" stroke="#f0f0f0" stroke-width="1"/>`;
    grid += `<text x="${PAD.left - 4}" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="9" fill="#d0d0d0">${v > 0 ? '+' : ''}${v}</text>`;
  }

  if (multiRound) {
    // Multi-round: draw round separators and hole labels relative within each round
    for (let r = 1; r <= numRounds; r++) {
      const rStart = (r - 1) * 18;
      const rEnd   = r * 18;
      const rLabel = `R${r}`;
      const midX   = xOf(rStart + 9);
      // Round label centered above the segment
      grid += `<text x="${midX.toFixed(1)}" y="${PAD.top - 8}" text-anchor="middle" font-size="9" font-weight="700" fill="#bbb" letter-spacing="0.5">${rLabel}</text>`;
      // Round separator (thick line before R2+)
      if (r > 1) {
        const sepX = xOf(rStart);
        grid += `<line x1="${sepX.toFixed(1)}" y1="${PAD.top - 14}" x2="${sepX.toFixed(1)}" y2="${H - PAD.bottom}" stroke="#c8c8c8" stroke-width="1.5" stroke-dasharray="3,2"/>`;
      }
      // Hole lines within round: hole 1-18 mapped to absolute positions rStart+1..rEnd
      for (let h = 1; h <= 18; h++) {
        const xAbs = rStart + h;
        const x    = xOf(xAbs);
        const isTurn = h === 10;
        grid += `<line x1="${x.toFixed(1)}" y1="${PAD.top}" x2="${x.toFixed(1)}" y2="${H - PAD.bottom}" stroke="${isTurn ? '#ddd' : '#f5f5f5'}" stroke-width="${isTurn ? 1.2 : 0.8}"/>`;
        // Label holes 1, 9, 18 per round
        if (h === 1 || h === 9 || h === 18) {
          grid += `<text x="${x.toFixed(1)}" y="${H - 18}" text-anchor="middle" font-size="7.5" fill="#ccc">${h}</text>`;
        }
      }
      // OUT/IN labels per round
      grid += `<text x="${xOf(rStart + 4.5).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="7" fill="#ddd" letter-spacing="0.6">OUT</text>`;
      grid += `<text x="${xOf(rStart + 13.5).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="7" fill="#ddd" letter-spacing="0.6">IN</text>`;
    }
  } else {
    // Single round: standard hole grid
    for (let h = 1; h <= 18; h++) {
      const x = xOf(h);
      grid += `<line x1="${x.toFixed(1)}" y1="${PAD.top}" x2="${x.toFixed(1)}" y2="${H - PAD.bottom}" stroke="${h === 10 ? '#d0d0d0' : '#f2f2f2'}" stroke-width="${h === 10 ? 1.5 : 1}"/>`;
      if ([1, 3, 5, 7, 9, 10, 12, 14, 16, 18].includes(h)) {
        grid += `<text x="${x.toFixed(1)}" y="${H - 18}" text-anchor="middle" font-size="8.5" fill="#c8c8c8">${h}</text>`;
      }
    }
    grid += `<text x="${xOf(4.5).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="7.5" fill="#ddd" letter-spacing="0.8" font-weight="600">OUT</text>`;
    grid += `<text x="${xOf(13.5).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="7.5" fill="#ddd" letter-spacing="0.8" font-weight="600">IN</text>`;
  }

  // Series
  let areas = '', lines = '', hits = '', allDots = '';
  const endLabels = [];

  series.forEach((s, si) => {
    const vpts = s.pts.map(p => ({
      x: xOf(p.x), y: yOf(p.y), val: p.y,
      holeNum: p.holeNum, round: p.round,
      scoreType: p.scoreType, value: p.value, par: p.par,
    }));
    if (vpts.length < 2) return;
    const lp  = smoothPath(vpts);
    const bot = H - PAD.bottom;
    areas += `<path d="${lp} L${vpts[vpts.length-1].x.toFixed(1)},${bot} L${vpts[0].x.toFixed(1)},${bot} Z" fill="url(#hg${si})" class="sh-area" data-si="${si}" pointer-events="none"/>`;
    lines += `<path d="${lp}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="sh-line" data-si="${si}" pointer-events="none"/>`;
    hits  += `<path d="${lp}" fill="none" stroke="transparent" stroke-width="18" class="sh-hit" data-si="${si}" style="cursor:pointer"/>`;

    vpts.forEach((pt, pi) => {
      if (!pt.holeNum) return; // skip x=0 start marker
      const isKey = !s.isGolfer
        ? (pt.holeNum === 9 || pt.holeNum === 18 || pi === vpts.length - 1)
        : true; // show all holes for golfers
      if (!isKey) return;
      const dc = (s.isGolfer && pt.scoreType) ? (holeColor(pt.scoreType) || s.color) : s.color;
      const r  = s.isGolfer ? 3.5 : 5;
      const cumLbl = pt.val === 0 ? 'E' : (pt.val > 0 ? `+${Math.round(pt.val)}` : String(Math.round(pt.val)));
      let tipText;
      if (s.isGolfer && pt.scoreType) {
        const stLbl = pt.scoreType.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const rPfx  = multiRound ? `R${pt.round} ` : '';
        tipText = `${s.fullName} · ${rPfx}H${pt.holeNum}: ${pt.value} (par ${pt.par}) — ${stLbl} · ${cumLbl} total`;
      } else {
        const rPfx = multiRound ? `R${pt.round} ` : '';
        tipText = `${s.fullName} · ${rPfx}H${pt.holeNum}: ${cumLbl}`;
      }
      allDots += `<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="${r}" fill="${dc}" stroke="#fff" stroke-width="1.2" class="sh-dot" data-si="${si}" data-r="${r}" data-tip="${tipText.replace(/'/g, '&#39;').replace(/"/g, '&quot;')}"/>`;
    });

    const last = vpts[vpts.length - 1];
    const ev   = last.val === 0 ? 'E' : (last.val > 0 ? `+${Math.round(last.val)}` : String(Math.round(last.val)));
    endLabels.push({ y: last.y, x: last.x, name: s.name, val: ev, color: s.color, si });
  });

  // De-collide end labels
  endLabels.sort((a, b) => a.y - b.y);
  for (let i = 1; i < endLabels.length; i++) {
    if (endLabels[i].y < endLabels[i - 1].y + 13) endLabels[i].y = endLabels[i - 1].y + 13;
  }
  const labelsHtml = endLabels.map(el =>
    `<text x="${(el.x + 7).toFixed(1)}" y="${(el.y + 4).toFixed(1)}" font-size="10" font-weight="700" fill="${el.color}" class="sh-label" data-si="${el.si}">${el.name} ${el.val}</text>`
  ).join('');

  wrap.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:visible;display:block">
    ${defs}<g>${grid}</g><g>${areas}</g><g>${lines}</g><g>${hits}</g><g>${allDots}</g><g>${labelsHtml}</g>
  </svg>`;

  legendEl.innerHTML = series.map((s, si) =>
    `<div class="chart-legend-item" data-si="${si}" style="cursor:pointer">
      <div class="chart-legend-swatch" style="background:${s.color}"></div>
      <span style="font-size:.75rem">${s.fullName}</span>
    </div>`
  ).join('');

  // Interaction
  const svg = wrap.querySelector('svg');
  if (!svg) return;
  const tip = document.getElementById('chart-tooltip');
  function hilite(si) {
    const dim = '0.06';
    svg.querySelectorAll('.sh-line').forEach(el => {
      el.style.opacity     = (si === null || +el.dataset.si === si) ? '1' : dim;
      el.style.strokeWidth = (si !== null && +el.dataset.si === si) ? '3.5' : '2.2';
    });
    svg.querySelectorAll('.sh-area,.sh-label').forEach(el => {
      el.style.opacity = (si === null || +el.dataset.si === si) ? '1' : dim;
    });
    svg.querySelectorAll('.sh-dot').forEach(el => {
      const match = si === null || +el.dataset.si === si;
      el.style.opacity = match ? '1' : dim;
      el.setAttribute('r', match && si !== null ? (+el.dataset.r * 1.5).toFixed(1) : el.dataset.r);
    });
    legendEl.querySelectorAll('.chart-legend-item').forEach(el => {
      el.style.opacity = (si === null || +el.dataset.si === si) ? '1' : '0.35';
    });
  }
  svg.querySelectorAll('.sh-hit').forEach(el => {
    el.addEventListener('mouseenter', () => hilite(+el.dataset.si));
    el.addEventListener('mouseleave', () => hilite(null));
  });
  svg.querySelectorAll('.sh-dot').forEach(el => {
    el.addEventListener('mouseenter', e => {
      hilite(+el.dataset.si);
      if (el.dataset.tip) { tip.innerHTML = el.dataset.tip; tip.style.display = 'block'; }
    });
    el.addEventListener('mousemove', e => { tip.style.left = (e.clientX + 16) + 'px'; tip.style.top = (e.clientY - 42) + 'px'; });
    el.addEventListener('mouseleave', () => { hilite(null); tip.style.display = 'none'; });
  });
  legendEl.querySelectorAll('.chart-legend-item').forEach(el => {
    el.addEventListener('mouseenter', () => hilite(+el.dataset.si));
    el.addEventListener('mouseleave', () => hilite(null));
  });
}

// ─── EXPORT CSV ───────────────────────────────────────────────────────────────

function exportCSV() {
  const entries = calcAll(viewRound).filter(r => !r.pending);
  const label = viewRound ? `R${viewRound}` : 'Live';

  const rows = [
    ['Rank', 'Name', 'Best 4', 'All 8',
     'Pick 1', 'Score 1', 'Pick 2', 'Score 2', 'Pick 3', 'Score 3', 'Pick 4', 'Score 4',
     'Pick 5', 'Score 5', 'Pick 6', 'Score 6', 'Pick 7', 'Score 7', 'Pick 8', 'Score 8'],
  ];

  for (const r of entries) {
    const row = [
      r.displayRank || '—',
      r.entry.name,
      fmtScore(r.total, false),
      fmtScore(r.allTotal, false),
    ];
    for (const p of r.pickData) {
      row.push(p.name, fmtScore(p.score, p.notFound));
    }
    rows.push(row);
  }

  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `hammy-masters-${label.toLowerCase()}.csv`;
  a.click();
}

// ─── REFRESH ──────────────────────────────────────────────────────────────────

function setBanners(html) { document.getElementById('banners').innerHTML = html; }
function setStatus(txt)   { document.getElementById('status-text').textContent = txt; }

function startTick() {
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(() => {
    if (!lastFetch) return;
    const rem = Math.max(0, nextFetch - Date.now());
    const m   = Math.floor(rem / 60000);
    const s   = Math.floor((rem % 60000) / 1000).toString().padStart(2, '0');
    setStatus(`Updated ${lastFetch.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} · Next in ${m}:${s}`);
  }, 1000);
}

async function doRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ …';

  try {
    const raw = await fetchESPN();
    const { scores, tournamentName, tournamentStatus,
            currentRound, roundInProgress, playersRemaining, completedRounds } = parseESPN(raw);
    liveScores = scores;
    roundInfo  = { currentRound, roundInProgress, playersRemaining, completedRounds };
    lastFetch  = new Date();
    nextFetch  = Date.now() + REFRESH_MS;

    // If viewing a completed round that no longer exists, reset to live
    if (viewRound !== null && viewRound > completedRounds) viewRound = null;

    // Header labels
    const label = [tournamentName, tournamentStatus].filter(Boolean).join(' · ');
    document.getElementById('tournament-label').textContent = label || 'Masters Tournament 2026';

    // Banners
    const isMasters = (tournamentName || '').toLowerCase().includes('master');
    const banners = [];
    if (tournamentName && !isMasters) {
      banners.push(`<div class="banner warning">⚠️ ESPN is currently showing <strong>${tournamentName}</strong>, not The Masters.</div>`);
    }
    if (roundInProgress && playersRemaining > 0) {
      banners.push(`<div class="banner info">🏌️ Round ${currentRound} in progress — ${playersRemaining} player${playersRemaining !== 1 ? 's' : ''} still on course. Scores updating live.</div>`);
    }
    setBanners(banners.join(''));

    // Snapshot totals before re-render so we can flash changed cards
    const prevTotals = {};
    calcAll(viewRound).filter(r => !r.pending && !r.entry?.special).forEach(r => { prevTotals[r.entry.name] = r.total; });

    renderRoundTabs();
    renderOnCourse();
    renderLeaderboard();
    renderMovers();
    renderPoolIntel();
    renderChart();
    renderStrokeByStroke();
    // Fetch hole-by-hole data in background; re-render when done
    fetchHoleScores().then(() => renderStrokeByStroke());

    // Flash cards whose score changed since last refresh
    if (lastFetch) { // not first load
      document.querySelectorAll('.entry-card[data-person]').forEach(card => {
        const name = card.dataset.person;
        const curr = calcAll(viewRound).find(r => r.entry?.name === name);
        if (curr && prevTotals[name] !== undefined && curr.total !== prevTotals[name]) {
          card.classList.remove('score-flash');
          void card.offsetWidth; // reflow to restart animation
          card.classList.add('score-flash');
        }
      });
    }

    // Restore chart open state from localStorage
    if (localStorage.getItem('chartOpen') === '1') {
      document.getElementById('chart-panel').classList.add('open');
    }
    if (localStorage.getItem('strokeOpen') === '1') {
      document.getElementById('stroke-panel').classList.add('open');
    }

    startTick();
  } catch (err) {
    console.error('ESPN fetch failed:', err);
    const hadData = Object.keys(liveScores).length > 0;
    setBanners(`<div class="banner error">⚠️ Couldn't reach ESPN API. ${hadData ? 'Showing last known scores.' : 'No data yet — try again shortly.'} <small style="opacity:.7">${err.message}</small></div>`);
    if (hadData) renderLeaderboard();
    else document.getElementById('leaderboard').innerHTML =
      `<div class="loading-state" style="color:var(--red)">Failed to load.<br><small>Check your connection and hit Refresh.</small></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

doRefresh();
setInterval(doRefresh, REFRESH_MS);
</script>
