<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hammy Masters Pool 2026</title>
  <style>
    :root {
      --green-dark:  #0d2410;
      --green-mid:   #2d5a27;
      --green-light: #e8f5e9;
      --gold:        #c9a227;
      --gold-dark:   #9a7a1a;
      --red:         #c0392b;
      --red-light:   #fce4ec;
      --purple-light:#f3e5f5;
      --border:      #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f2f4f2;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(160deg, var(--green-dark) 0%, #1e4a18 60%, #2a5022 100%);
      color: #fff;
      padding: 20px 16px 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 3px 14px rgba(0,0,0,.35);
    }

    header .eyebrow {
      font-size: .68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 4px;
    }

    header h1 {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -.3px;
      line-height: 1.15;
    }

    #tournament-label {
      font-size: .75rem;
      color: rgba(255,255,255,.65);
      margin-top: 3px;
    }

    .header-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    #status-text { font-size: .72rem; color: rgba(255,255,255,.65); }

    .refresh-btn {
      background: var(--gold);
      color: #fff;
      border: none;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .2px;
      transition: background .15s;
    }
    .refresh-btn:hover  { background: var(--gold-dark); }
    .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── MAIN ── */
    main {
      max-width: 740px;
      margin: 0 auto;
      padding: 14px 12px 48px;
    }

    /* ── BANNERS ── */
    .banner {
      border-radius: 8px;
      padding: 9px 13px;
      margin-bottom: 10px;
      font-size: .8rem;
      line-height: 1.4;
    }
    .banner.error   { background: var(--red-light);   color: #b71c1c; border: 1px solid #ef9a9a; }
    .banner.warning { background: #fff8e1; color: #e65100; border: 1px solid #ffcc80; }
    .banner.info    { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

    /* ── LEGEND ── */
    .legend {
      background: #fff;
      border-radius: 9px;
      padding: 9px 13px;
      margin-bottom: 12px;
      font-size: .75rem;
      color: #555;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      display: flex;
      flex-wrap: wrap;
      gap: 3px 18px;
      align-items: center;
    }
    .legend strong { color: #222; }
    .dot-neg { color: #1e6b3a; font-size: .9rem; }
    .dot-pos { color: var(--red); font-size: .9rem; }

    /* ── ENTRY CARDS ── */
    .entry-card {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 9px;
      box-shadow: 0 1px 4px rgba(0,0,0,.09);
      border: 1px solid rgba(0,0,0,.06);
      overflow: hidden;
    }
    .entry-card.pending-card {
      background: #fafafa;
      border-style: dashed;
      border-color: #d0d0d0;
      opacity: .75;
    }

    /* Card clickable header row */
    .card-header {
      display: flex;
      align-items: center;
      padding: 11px 13px;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card-header:active { background: #f5f5f5; }

    .rank-badge {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: .8rem;
      flex-shrink: 0;
      background: #e0e0e0;
      color: #666;
    }
    .rank-badge.gold   { background: var(--gold);   color: #fff; }
    .rank-badge.silver { background: #9e9e9e;        color: #fff; }
    .rank-badge.bronze { background: #a0765e;        color: #fff; }
    .rank-badge.field  { background: var(--green-mid); color: #fff; }

    .card-name {
      flex: 1;
      font-size: 1rem;
      font-weight: 700;
      color: #111;
    }

    .card-total {
      font-size: 1.35rem;
      font-weight: 800;
      min-width: 50px;
      text-align: right;
    }

    .chevron {
      color: #bbb;
      font-size: .85rem;
      margin-left: 2px;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .entry-card.open .chevron { transform: rotate(180deg); }

    /* Score colours */
    .neg  { color: #1a7f3a; }
    .pos  { color: var(--red); }
    .even { color: #444; }

    /* Best-4 preview chips */
    .chips-row {
      padding: 0 13px 10px 57px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--green-light);
      border: 1px solid #c8e6c9;
      border-radius: 14px;
      padding: 2px 9px;
      font-size: .72rem;
      font-weight: 500;
      white-space: nowrap;
    }
    .chip.cut-chip     { background: var(--red-light);    border-color: #ef9a9a; color: #c62828; }
    .chip.invalid-chip { background: var(--purple-light); border-color: #ce93d8; color: #6a1b9a; }
    .chip .cscore      { font-weight: 700; }

    /* ── EXPANDED SECTION ── */
    .card-detail {
      display: none;
      border-top: 1px solid var(--border);
      background: #fafafa;
      padding: 11px 13px 13px;
    }
    .entry-card.open .card-detail { display: block; }

    .detail-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .9px;
      color: #aaa;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .picks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    @media (max-width: 420px) { .picks-grid { grid-template-columns: 1fr; } }

    .pick-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: .8rem;
      gap: 6px;
      min-width: 0;
    }
    .pick-row.top4-row    { background: #f1f8e9; border-color: #aed581; }
    .pick-row.cut-row     { background: var(--red-light);    border-color: #ef9a9a; }
    .pick-row.invalid-row { background: var(--purple-light); border-color: #ce93d8; }

    .pick-name {
      flex: 1;
      font-weight: 500;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pick-right {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .tag {
      font-size: .6rem;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .tag.cut-tag     { background: var(--red-light);    color: var(--red);  border: 1px solid #ef9a9a; }
    .tag.invalid-tag { background: var(--purple-light); color: #6a1b9a;     border: 1px solid #ce93d8; }
    .tag.top4-tag    { background: var(--green-light);  color: #2e7d32;     border: 1px solid #a5d6a7; }

    .pick-score-val {
      font-weight: 800;
      font-size: .88rem;
      min-width: 28px;
      text-align: right;
    }

    /* ── PLAYER LINKS ── */
    a.player-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dotted rgba(0,0,0,.25);
    }
    a.player-link:hover { border-bottom-style: solid; }

    /* ── ROUND TABS ── */
    .round-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .round-tab {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: .73rem;
      font-weight: 600;
      cursor: pointer;
      color: #777;
      transition: all .12s;
      white-space: nowrap;
    }
    .round-tab:hover { border-color: var(--green-mid); color: var(--green-mid); }
    .round-tab.active { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }
    .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #ff4444;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── CONTROLS BAR ── */
    .controls-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .ctrl-btn {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: .73rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: background .12s, border-color .12s;
    }
    .ctrl-btn:hover { background: #f0f0f0; border-color: #bbb; }
    .ctrl-btn.export-btn { margin-left: auto; color: var(--green-mid); border-color: var(--green-mid); }
    .ctrl-btn.export-btn:hover { background: var(--green-light); }

    /* ── SCORE STACK (best-4 + all-8 + delta) ── */
    .score-stack { text-align: right; }
    .all8-label { font-size: .6rem; color: #aaa; margin-top: 1px; white-space: nowrap; }
    .all8-val { font-weight: 700; }

    /* ── DAY DELTA ── */
    .delta-badge {
      font-size: .62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .delta-badge.better { background: #e8f5e9; color: #1a7f3a; border: 1px solid #a5d6a7; }
    .delta-badge.worse  { background: var(--red-light); color: var(--red); border: 1px solid #ef9a9a; }
    .delta-badge.same   { background: #f5f5f5; color: #888; border: 1px solid #ddd; }

    /* ── RANK DELTA ── */
    .rank-delta {
      font-size: .58rem;
      font-weight: 700;
      text-align: center;
      margin-top: 2px;
      white-space: nowrap;
      line-height: 1;
    }
    .rank-delta.up   { color: #1a7f3a; }
    .rank-delta.down { color: var(--red); }
    .rank-delta.flat { color: #aaa; }

    /* ── PLAYER STATUS DOT ── */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }
    .status-dot.playing  { background: #ff4444; animation: pulse 1.2s ease-in-out infinite; }
    .status-dot.finished { background: #aaa; }
    .status-dot.waiting  { background: #d0d0d0; }

    /* ── PLAYER DELTA PILL (inside chip / pick-row) ── */
    .pdelta {
      font-size: .6rem;
      font-weight: 700;
      margin-left: 2px;
    }
    .pdelta.better { color: #1a7f3a; }
    .pdelta.worse  { color: var(--red); }
    .pdelta.same   { color: #aaa; }

    /* ── LOADING ── */
    .loading-state {
      text-align: center;
      padding: 52px 20px;
      color: #777;
      font-size: .9rem;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(45,90,39,.2);
      border-top-color: var(--green-mid);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: .7rem;
      color: #bbb;
    }

    /* ── CHART TOOLTIP ── */
    #chart-tooltip {
      display: none;
      position: fixed;
      background: rgba(10,30,10,.88);
      color: #fff;
      font-size: .75rem;
      line-height: 1.45;
      padding: 6px 10px;
      border-radius: 7px;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(0,0,0,.3);
    }
    #chart-tooltip strong { font-size: .82rem; }

    /* ── CHART PANEL ── */
    .chart-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.09);
      border: 1px solid rgba(0,0,0,.06);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .chart-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 700;
      color: #333;
      -webkit-tap-highlight-color: transparent;
    }
    .chart-toggle:hover { background: #fafafa; }
    .chart-toggle .chevron { color: #bbb; transition: transform .2s; }
    .chart-panel.open .chart-toggle .chevron { transform: rotate(180deg); }
    .chart-body {
      display: none;
      padding: 4px 10px 16px;
    }
    .chart-panel.open .chart-body { display: block; }
    .chart-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .chart-tab {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      padding: 3px 11px;
      font-size: .68rem;
      font-weight: 600;
      cursor: pointer;
      color: #777;
    }
    .chart-tab.active { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }
    #chart-svg-wrap { width: 100%; overflow-x: auto; }
    #chart-svg-wrap svg { display: block; }
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      margin-top: 10px;
      padding: 0 4px;
    }
    .chart-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .7rem;
      color: #444;
    }
    .chart-legend-swatch {
      width: 22px; height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .chart-legend-item { transition: opacity .15s; cursor: pointer; border-radius: 4px; padding: 2px 4px; }
    .chart-legend-item:hover { background: #f0f0f0; }

    /* ── SCORE FLASH ── */
    @keyframes scoreFlash { 0%{background:#fffde7} 100%{background:transparent} }
    .score-flash { animation: scoreFlash 1.2s ease-out; }

    /* ── TODAY'S MOVERS ── */
    .movers-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.09);
      border: 1px solid rgba(0,0,0,.06);
      margin-bottom: 12px;
      padding: 10px 13px 12px;
    }
    .movers-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 9px;
    }
    .movers-title {
      font-size: .67rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
      color: #aaa;
    }
    .movers-subtitle { font-size: .67rem; color: #ccc; }
    .movers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
    .movers-col-title { font-size: .68rem; font-weight: 700; margin-bottom: 5px; }
    .mover-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      border-radius: 7px;
      font-size: .73rem;
      margin-bottom: 3px;
      gap: 6px;
    }
    .mover-row.hot  { background: #e8f5e9; }
    .mover-row.cold { background: #fce4ec; }
    .mover-left  { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .mover-name  { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mover-score { font-weight: 800; flex-shrink: 0; }
    .mover-dots  { display: flex; gap: 2px; flex-shrink: 0; }
    .picker-dot  {
      width: 16px; height: 16px; border-radius: 50%;
      font-size: .58rem; font-weight: 800; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── POOL INTEL ── */
    .intel-table { width: 100%; border-collapse: collapse; font-size: .73rem; }
    .intel-table th {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: #aaa; padding: 4px 7px 6px;
      text-align: left; border-bottom: 2px solid #f0f0f0;
      white-space: nowrap;
    }
    .intel-table th.center { text-align: center; }
    .intel-table td { padding: 5px 7px; border-bottom: 1px solid #f8f8f8; vertical-align: middle; }
    .intel-table tr:last-child td { border-bottom: none; }
    .intel-table tr:hover td { background: #fafafa; }
    .intel-pos-cell { text-align: center; }
    .intel-score-cell { font-weight: 800; white-space: nowrap; }
    .intel-dot-cell { white-space: nowrap; }

    /* ── PER-ROUND BADGES ── */
    .rounds-strip { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; width: 100%; }
    .rbadge {
      font-size: .58rem; font-weight: 700; padding: 1px 5px; border-radius: 5px;
      background: #f0f0f0; color: #888; white-space: nowrap;
    }
    .rbadge.neg  { background: #e8f5e9; color: #1a7f3a; }
    .rbadge.pos  { background: #fce4ec; color: #c0392b; }
    .rbadge.even { background: #f5f5f5; color: #777; }
    .rbadge.thru { background: #e3f2fd; color: #1565c0; }
    .rbadge.pga  { background: #f3e5f5; color: #6a1b9a; }

    /* ── ON COURSE NOW ── */
    .oncourse-panel {
      background: linear-gradient(135deg, #0d2410 0%, #1e4a18 100%);
      border-radius: 12px;
      margin-bottom: 12px;
      padding: 11px 13px 13px;
      color: #fff;
    }
    .oncourse-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .oncourse-title { font-size: .67rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; color: rgba(255,255,255,.55); }
    .oncourse-round { font-size: .72rem; color: var(--gold); font-weight: 700; margin-left: auto; }
    .oncourse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 6px; }
    .oncourse-card {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      padding: 7px 9px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .oncourse-score { font-size: 1rem; font-weight: 800; min-width: 32px; text-align: right; flex-shrink: 0; }
    .oncourse-info { min-width: 0; flex: 1; }
    .oncourse-name { font-size: .73rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .oncourse-sub  { font-size: .6rem; color: rgba(255,255,255,.45); margin-top: 1px; }
    .oncourse-dots { display: flex; gap: 2px; margin-top: 3px; }

    /* ── PROJECTED FLOOR ── */
    .proj-label { font-size: .58rem; color: #bbb; margin-top: 2px; white-space: nowrap; }
  </style>
</head>
<body>

<div id="chart-tooltip"></div>
<header>
  <div class="eyebrow">⛳ Masters Pool 2026</div>
  <h1>Hammy Leaderboard</h1>
  <div id="tournament-label">Fetching tournament info…</div>
  <div class="header-bottom">
    <span id="status-text">Loading…</span>
    <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">↻ Refresh</button>
  </div>
</header>

<main>
  <div id="banners"></div>

  <div id="round-tabs" class="round-tabs" style="display:none"></div>

  <div class="controls-bar">
    <button class="ctrl-btn" onclick="expandAll()">▼ Expand All</button>
    <button class="ctrl-btn" onclick="collapseAll()">▲ Collapse All</button>
    <button class="ctrl-btn export-btn" onclick="exportCSV()">⬇ CSV</button>
  </div>

  <div id="oncourse-panel" style="display:none"></div>
  <div id="movers-panel" class="movers-panel" style="display:none"></div>

  <div class="chart-panel" id="chart-panel" style="display:none">
    <button class="chart-toggle" onclick="toggleChart()">
      <span>📈 Standings Over Time</span>
      <span class="chevron">▼</span>
    </button>
    <div class="chart-body">
      <div class="chart-tabs">
        <button class="chart-tab active" onclick="setChartMode('rank',this)">Rank</button>
        <button class="chart-tab" onclick="setChartMode('score',this)">Score (best 4)</button>
      </div>
      <div id="chart-svg-wrap"></div>
      <div class="chart-legend" id="chart-legend"></div>
    </div>
  </div>

  <div class="chart-panel" id="intel-panel" style="display:none">
    <button class="chart-toggle" onclick="toggleIntel()">
      <span>🔍 Pool Intel · Who Picked Who</span>
      <span class="chevron">▼</span>
    </button>
    <div class="chart-body" style="padding-top:8px">

<script>
// ─── POOL DATA ────────────────────────────────────────────────────────────────
// Full ESPN display names used for API matching.
// canadians: Set of names to flag 🇨🇦
// invalid:   Set of names not in the field (auto-scored +50)

const POOL = [

    ],

    ],
    canadians: new Set(['Corey Conners']),
  },
  {
    name: 'Haley',
    picks: [

      'Tony Finau', 'Corey Conners', 'Brooks Koepka', 'Will Zalatoris',
    ],
    canadians: new Set(['Corey Conners']),
    invalid:   new Set(['Tony Finau', 'Will Zalatoris']),  // not in 2026 field
    special: true,  // archived entry — shown separately at bottom
  },
];

// ─── STATE ────────────────────────────────────────────────────────────────────

let liveScores = {};   // normalizedName → { score, cut, wd, displayName, espnId, rounds }
let lastFetch  = null;
let nextFetch  = null;
let tickTimer  = null;
let roundInfo  = { currentRound: 1, roundInProgress: false, playersRemaining: 0, completedRounds: 0 };
let viewRound  = null;  // null = live cumulative; 1/2/3/4 = snapshot after that round

// Hole-by-hole state
let holeScores     = {};   // espnId → { rounds: { r: [{hole,value,par,scoreType}...] } }
let currentEventId = null; // ESPN event ID (captured from leaderboard response)
let holeEventId    = null; // event ID that holeScores was fetched for (cache invalidation)
let strokeView     = 'golfers';
let strokeRound    = null;   // null | 1 | 2 | 3 | 4 | 'all'
let strokeFilter   = 'all';  // 'all' | 'top10' | 'top5'

const REFRESH_MS = 5 * 60 * 1000;

// ─── HELPERS ─────────────────────────────────────────────────────────────────

/** Strip diacritics and lowercase for fuzzy name matching */
function norm(name) {
  return name
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function espnUrl(name, espnId) {
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  return espnId
    ? `https://www.espn.com/golf/player/_/id/${espnId}/${slug}`
    : `https://www.espn.com/golf/players`;
}

function fmtScore(score, notFound) {
  if (notFound || score === 0) return 'E';
  if (score === 50)            return '+50';
  return score > 0 ? `+${score}` : String(score);
}

function cls(score) {
  if (score < 0) return 'neg';
  if (score > 0) return 'pos';
  return 'even';
}

// ─── ESPN API ─────────────────────────────────────────────────────────────────

async function fetchESPN() {
  const url = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`ESPN HTTP ${res.status}`);
  return res.json();
}

function parseESPN(data) {
  const scores = {};
  let tournamentName   = null;
  let tournamentStatus = null;
  let currentRound     = 1;
  let roundInProgress  = false;
  let playersRemaining = 0;

  for (const event of (data.events || [])) {
    if (event.id) currentEventId = event.id;
    tournamentName = event.name || event.shortName || tournamentName;

    for (const comp of (event.competitions || [])) {
      tournamentStatus = comp.status?.type?.description || null;
      currentRound     = comp.status?.period || 1;
      roundInProgress  = comp.status?.type?.state === 'in';

      for (const c of (comp.competitors || [])) {
        const displayName = c.athlete?.displayName || '';
        if (!displayName) continue;

        const key = norm(displayName);

        // Cumulative score — use scoreToPar stat (includes in-progress round)
        // score.displayValue is only the latest *round* score, not the running total
        const scoreToParStat = c.statistics?.find(s => s.name === 'scoreToPar');
        const raw = (scoreToParStat?.displayValue ?? c.score?.displayValue ?? '').toString().trim();
        let score = 0;
        if (raw !== '' && raw !== 'E' && raw !== '--') {
          const n = parseInt(raw, 10);
          if (!isNaN(n)) score = n;
        }

        // Per-round scores from linescores
        // Only store rounds where a real score exists (skip '-' = not yet played)
        const rounds = {};
        const halves = {}; // period → { front: topar, back: topar } — only for complete rounds
        for (const ls of (c.linescores || [])) {
          if (!ls.period) continue;
          const dv = (ls.displayValue || '').trim();
          if (dv === '-' || dv === '--' || dv === '') continue; // not played yet
          rounds[ls.period] = (dv === 'E') ? 0 : (parseInt(dv, 10) || 0);
          // outScore/inScore = raw stroke totals; Augusta par front=36, back=36
          if (ls.outScore !== undefined && ls.inScore !== undefined) {
            halves[ls.period] = { front: ls.outScore - 36, back: ls.inScore - 36 };
          }
        }

        // Status
        const sName  = c.status?.type?.name || '';
        const sDesc  = (c.status?.type?.description || '').toLowerCase();
        const sState = c.status?.type?.state || '';
        const cut = sName.includes('CUT') || sDesc.includes('cut') || sName === 'STATUS_ELIMINATED';
        const wd  = sName.includes('WITHDRAWN') || sDesc.includes('withdraw') || sName === 'STATUS_WD';

        if (sState === 'in') playersRemaining++;
        if (cut) score = 50;

        // Player status for indicators
        const finished  = sState === 'post' || sName === 'STATUS_FINISH';
        const playing   = sState === 'in'   || sName === 'STATUS_IN_PROGRESS';

        // PGA leaderboard position and holes thru
        const position = c.status?.position?.displayName || null;
        const thruRaw  = c.status?.displayThru || '';
        // displayThru is "F", "14", or a tee time string ("1:44 PM ET") — only show short ones
        const thru = (thruRaw === 'F' || /^\d+$/.test(thruRaw)) ? thruRaw : null;
        // Human-readable tee time for scheduled players (e.g. "2:50 PM ET")
        const teeTimeLabel = sState === 'pre' ? (c.status?.detail || null) : null;

        const espnId = c.athlete?.id || null;
        scores[key] = { score, cut, wd, displayName, espnId, rounds, finished, playing, position, thru, teeTimeLabel };
      }
    }
  }

  // How many rounds are fully complete
  // R1/R2: check all non-WD players. R3/R4: cut players won't have scores, so only check non-cut players.
  const allPlayers = Object.values(scores);
  const eligible   = allPlayers.filter(p => !p.wd);
  let completedRounds = 0;
  for (let r = 1; r <= 4; r++) {
    if (roundInProgress && r === currentRound) break; // this round still live
    const pool = r >= 3 ? eligible.filter(p => !p.cut) : eligible;
    if (!pool.length) break;
    const withScore = pool.filter(p => p.rounds[r] !== undefined).length;
    if (withScore >= pool.length * 0.9) completedRounds = r;
    else break;
  }

  return { scores, tournamentName, tournamentStatus, currentRound, roundInProgress, playersRemaining, completedRounds };
}

// ─── SCORE LOOKUP ─────────────────────────────────────────────────────────────

function getPlayerScore(name, invalidSet, roundFilter) {
  if (invalidSet && invalidSet.has(name)) {
    return { score: 50, cut: false, invalid: true, notFound: false, espnId: null };
  }
  const data = liveScores[norm(name)];
  if (!data) return { score: 0, cut: false, invalid: false, notFound: true, espnId: null };

  if (roundFilter != null) {
    // Sum per-round scores up through roundFilter
    let sum = 0;
    for (let r = 1; r <= roundFilter; r++) sum += (data.rounds[r] || 0);
    // Cut penalty only applies if player missed cut AND we're viewing R2+ (cut is made after R2)
    const cutApplies = data.cut && roundFilter >= 2;
    return { score: cutApplies ? 50 : sum, cut: cutApplies, wd: data.wd, invalid: false, notFound: false, espnId: data.espnId, finished: data.finished, playing: data.playing };
  }

  return { score: data.score, cut: data.cut, wd: data.wd, invalid: false, notFound: false, espnId: data.espnId, finished: data.finished, playing: data.playing };
}

// ─── CALCULATE STANDINGS ─────────────────────────────────────────────────────

function calcAll(roundFilter) {
  const ranked  = [];
  const pending = [];
  const special = [];

  for (const entry of POOL) {
    if (entry.pending) { pending.push({ entry, pending: true }); continue; }

    const pickData = entry.picks.map(name => ({
      name,
      isCanadian: (entry.canadians || new Set()).has(name),
      ...getPlayerScore(name, entry.invalid, roundFilter),
    }));

    // Best 4 = lowest 4 scores (cut/invalid are +50, so naturally sink to bottom)
    const sorted  = [...pickData].sort((a, b) => a.score - b.score);
    const top4    = sorted.slice(0, 4);
    const top4Set = new Set(top4.map(p => p.name));
    const total   = top4.reduce((sum, p) => sum + p.score, 0);
    const allTotal = pickData.reduce((sum, p) => sum + p.score, 0);

    // Bubble gap: difference between pick #5 (best non-top-4) and pick #4 (worst top-4)
    // If negative or zero, pick #5 is about to break in — drama!
    const bubbleGap = sorted.length >= 5 ? sorted[4].score - sorted[3].score : null;

    const result = {
      entry,
      total,
      allTotal,
      bubbleGap,
      pickData: pickData.map(p => ({ ...p, contributing: top4Set.has(p.name) })),
      top4,
    };

    if (entry.special) { special.push(result); continue; }
    ranked.push(result);
  }

  ranked.sort((a, b) => a.total - b.total);

  // Assign tie-aware display ranks (only for active competitors)
  let i = 0;
  while (i < ranked.length) {
    let j = i;
    while (j < ranked.length && ranked[j].total === ranked[i].total) j++;
    const rankNum  = i + 1;
    const isTie    = j - i > 1;
    for (let k = i; k < j; k++) {
      ranked[k].rank        = rankNum;
      ranked[k].displayRank = isTie ? `T${rankNum}` : `${rankNum}`;
    }
    i = j;
  }

  return [...ranked, ...pending, ...special];
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function badgeClass(rank) {
  if (rank === 1) return 'gold';
  if (rank === 2) return 'silver';
  if (rank === 3) return 'bronze';
  if (rank <= 5)  return 'field';
  return '';
}

function renderLeaderboard() {
  const entries = calcAll(viewRound);
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';

  // Determine "previous" round for delta comparisons
  const { completedRounds, roundInProgress, currentRound } = roundInfo;
  const prevRound = viewRound != null ? viewRound - 1
                  : completedRounds > 0 ? completedRounds
                  : null;

  // Family member delta maps (score + rank)
  const deltaMap     = {};  // name → score delta
  const rankDeltaMap = {};  // name → rank delta (negative = moved up)
  let prevEntries = null;
  if (prevRound != null && prevRound >= 1) {
    prevEntries = calcAll(prevRound);
    const prevActive  = prevEntries.filter(r => !r.pending && !r.entry.special);
    const prevByName  = Object.fromEntries(prevActive.map(r => [r.entry.name, r]));
    const currActive  = entries.filter(r => !r.pending && !r.entry.special);
    for (const r of currActive) {
      const prev = prevByName[r.entry.name];
      if (!prev) continue;
      deltaMap[r.entry.name]     = r.total - prev.total;
      rankDeltaMap[r.entry.name] = r.rank  - prev.rank;   // positive = moved down (worse)
    }
  }

  // Per-player score delta map: normalizedName → score delta vs prevRound
  const playerDeltaMap = {};
  if (prevRound != null && prevRound >= 1) {
    for (const [key, data] of Object.entries(liveScores)) {
      // Current score: live total
      const curScore = data.cut ? 50 : data.score;
      // Prev score: sum of rounds up to prevRound
      let prevScore = 0;
      for (let rr = 1; rr <= prevRound; rr++) prevScore += (data.rounds[rr] || 0);
      if (data.cut && prevRound >= 2) prevScore = 50;
      playerDeltaMap[key] = curScore - prevScore;
    }
  }

  let shownSpecialDivider = false;

  for (const r of entries) {
    // Insert divider before the special archived section
    if (r.entry && r.entry.special && !shownSpecialDivider) {
      shownSpecialDivider = true;
      const divider = document.createElement('div');
      divider.style.cssText = 'text-align:center;margin:22px 0 10px;font-size:.7rem;color:#bbb;letter-spacing:1.5px;text-transform:uppercase;';
      divider.innerHTML = '— Commissioner\'s Archive · Scott\'s 2025 Picks —';
      lb.appendChild(divider);
    }

    const card = document.createElement('div');
    card.className = 'entry-card';
    if (!r.pending && r.entry) card.dataset.person = r.entry.name;

    if (r.pending) {
      card.classList.add('pending-card');
      card.innerHTML = `
        <div class="card-header" style="cursor:default">
          <div class="rank-badge" style="background:#ddd;color:#bbb;font-size:.95rem">?</div>
          <div class="card-name" style="color:#bbb">${r.entry.name}</div>
          <div style="font-size:.75rem;color:#ccc;font-style:italic">Picks not yet received</div>
        </div>`;
      lb.appendChild(card);
      continue;
    }

    if (r.entry.special) {
      card.classList.add('pending-card');
    }

    const totalFmt   = fmtScore(r.total, false);
    const totalCls   = cls(r.total);
    const all8Fmt    = fmtScore(r.allTotal, false);
    const all8Cls    = cls(r.allTotal);

    // Delta badge — triangles: ▲ = improved (lower score), ▼ = worse, = same
    let deltaBadgeHtml = '';
    if (!r.entry.special && r.entry.name in deltaMap) {
      const d = deltaMap[r.entry.name];
      const dCls   = d < 0 ? 'better' : d > 0 ? 'worse' : 'same';
      const dLabel = d === 0 ? '= today' : d < 0 ? `▲${Math.abs(d)} today` : `▼${d} today`;
      deltaBadgeHtml = `<span class="delta-badge ${dCls}" title="Score change vs. last completed round">${dLabel}</span>`;
    }

    // Chips for best-4 preview (with player delta + status dot)
    const chipsHtml = r.top4.map(p => {
      const chipCls   = p.invalid ? 'invalid-chip' : p.cut ? 'cut-chip' : '';
      const flag      = p.isCanadian ? '🇨🇦 ' : '';
      const lastName  = p.name.split(' ').slice(-1)[0];
      const href      = espnUrl(p.name, p.espnId);
      const dotCls    = p.cut ? 'finished' : p.playing ? 'playing' : p.finished ? 'finished' : 'waiting';
      const dotHtml   = viewRound == null ? `<span class="status-dot ${dotCls}" title="${dotCls}"></span>` : '';
      const pd        = playerDeltaMap[norm(p.name)];
      let pdHtml = '';
      if (pd !== undefined && viewRound == null && prevRound != null) {
        const pdCls = pd < 0 ? 'better' : pd > 0 ? 'worse' : 'same';
        const pdLbl = pd === 0 ? '=' : pd < 0 ? `▲${Math.abs(pd)}` : `▼${pd}`;
        pdHtml = `<span class="pdelta ${pdCls}">${pdLbl}</span>`;
      }
      return `<a class="chip ${chipCls} player-link" href="${href}" target="_blank" rel="noopener" style="gap:5px">${dotHtml}${flag}${lastName} <span class="cscore ${cls(p.score)}">${fmtScore(p.score, p.notFound)}</span>${pdHtml}</a>`;
    }).join('');

    // All-picks detail grid (with player delta + status dot)
    const picksHtml = r.pickData.map(p => {
      let rowCls = '', tag = '';
      if (p.invalid) {
        rowCls = 'invalid-row';
        tag    = '<span class="tag invalid-tag">not in field</span>';
      } else if (p.cut) {
        rowCls = 'cut-row';
        tag    = '<span class="tag cut-tag">cut</span>';
      } else if (p.contributing) {
        rowCls = 'top4-row';
        tag    = '<span class="tag top4-tag">top 4</span>';
      }
      const flag    = p.isCanadian ? '🇨🇦 ' : '';
      const href    = espnUrl(p.name, p.espnId);
      const dotCls  = p.cut ? 'finished' : p.playing ? 'playing' : p.finished ? 'finished' : 'waiting';
      const dotHtml = viewRound == null && !p.invalid
        ? `<span class="status-dot ${dotCls}" title="${p.playing ? 'On course' : p.finished ? 'Round done' : 'Not yet teed off'}"></span>`
        : '';
      const pd    = playerDeltaMap[norm(p.name)];
      let pdHtml  = '';
      if (pd !== undefined && viewRound == null && prevRound != null && !p.invalid) {
        const pdCls = pd < 0 ? 'better' : pd > 0 ? 'worse' : 'same';
        const pdLbl = pd === 0 ? '= today' : pd < 0 ? `▲${Math.abs(pd)} today` : `▼${pd} today`;
        pdHtml = `<span class="pdelta ${pdCls}" style="font-size:.75rem;margin-left:4px">${pdLbl}</span>`;
      }

      // Per-round score badges + status info
      let roundsHtml = '';
      if (!p.invalid && !p.notFound) {
        const pData = liveScores[norm(p.name)];
        if (pData) {
          const badges = [];
          for (let rr = 1; rr <= 4; rr++) {
            if (pData.rounds[rr] === undefined) break;
            const rv = pData.rounds[rr];
            const rl = rv === 0 ? 'E' : (rv > 0 ? `+${rv}` : String(rv));
            badges.push(`<span class="rbadge ${rv < 0 ? 'neg' : rv > 0 ? 'pos' : 'even'}">R${rr} ${rl}</span>`);
          }
          if (viewRound == null && pData.playing && pData.thru && pData.thru !== 'F') {
            badges.push(`<span class="rbadge thru">thru ${pData.thru}</span>`);
          }
          if (viewRound == null && pData.teeTimeLabel && !pData.playing && !pData.finished && !p.cut) {
            badges.push(`<span class="rbadge" style="background:#fff8e1;color:#e65100">tees ${pData.teeTimeLabel}</span>`);
          }
          if (viewRound == null && pData.position && !p.cut) {
            badges.push(`<span class="rbadge pga">PGA ${pData.position}</span>`);
          }
          if (badges.length) roundsHtml = `<div class="rounds-strip">${badges.join('')}</div>`;
        }
      }

      return `
        <div class="pick-row ${rowCls}" style="flex-wrap:wrap">
          <span style="display:flex;align-items:center;gap:5px;min-width:0;flex:1">
            ${dotHtml}
            <a class="pick-name player-link" href="${href}" target="_blank" rel="noopener" style="min-width:0">${flag}${p.name}</a>
          </span>
          <span class="pick-right">
            ${pdHtml}
            ${tag}
            <span class="pick-score-val ${cls(p.score)}">${fmtScore(p.score, p.notFound)}</span>
          </span>
          ${roundsHtml}
        </div>`;
    }).join('');

    let rankDeltaHtml = '';
    if (!r.entry.special && r.entry.name in rankDeltaMap) {
      const rd = rankDeltaMap[r.entry.name];
      if (rd < 0)      rankDeltaHtml = `<div class="rank-delta up">▲${Math.abs(rd)}</div>`;
      else if (rd > 0) rankDeltaHtml = `<div class="rank-delta down">▼${rd}</div>`;
      else             rankDeltaHtml = `<div class="rank-delta flat">—</div>`;
    }
    const rankBadge = r.entry.special
      ? `<div style="flex-shrink:0;text-align:center"><div class="rank-badge" style="background:#ddd;color:#bbb;font-size:.95rem">📜</div></div>`
      : `<div style="flex-shrink:0;text-align:center"><div class="rank-badge ${badgeClass(r.rank)}">${r.displayRank}</div>${rankDeltaHtml}</div>`;

    card.innerHTML = `

          ${r.bubbleGap !== null && r.bubbleGap <= 3 && !r.entry.special ? `<div class="proj-label" title="Strokes between your 4th and 5th pick">🫧 gap: ${r.bubbleGap === 0 ? 'tied' : `+${r.bubbleGap}`}</div>` : ''}

}

// ─── ON COURSE NOW ────────────────────────────────────────────────────────────

function renderOnCourse() {
  const panel = document.getElementById('oncourse-panel');
  const { roundInProgress, currentRound } = roundInfo;
  if (!roundInProgress) { panel.style.display = 'none'; return; }

  const active = POOL.filter(e => !e.pending && !e.special);
  const pickerColors = Object.fromEntries(active.map((e, i) => [e.name, CHART_COLORS[i % CHART_COLORS.length]]));

  // Collect all unique picks from active entries
  const allPicks = new Map();
  active.forEach(entry => {
    entry.picks.forEach(name => {
      const k = norm(name);
      if (!allPicks.has(k)) allPicks.set(k, { displayName: name, pickers: [] });
      allPicks.get(k).pickers.push(entry.name);
    });
  });

  // Filter to currently playing picks only
  const playing = [];
  for (const [k, info] of allPicks) {
    const data = liveScores[k];
    if (!data || !data.playing) continue;
    const todayScore = data.rounds[currentRound];
    playing.push({
      name: info.displayName,
      pickers: info.pickers,
      todayScore: todayScore !== undefined ? todayScore : null,
      total: data.cut ? 50 : data.score,
      thru: data.thru,
      position: data.position,
      espnId: data.espnId,
    });
  }

  if (playing.length === 0) { panel.style.display = 'none'; return; }

  // Sort by today's score (best first), unknown last
  playing.sort((a, b) => {
    if (a.todayScore === null && b.todayScore === null) return 0;
    if (a.todayScore === null) return 1;
    if (b.todayScore === null) return -1;
    return a.todayScore - b.todayScore;
  });

  const cards = playing.map(p => {
    const sc  = p.todayScore;
    const lbl = sc === null ? '—' : sc === 0 ? 'E' : sc > 0 ? `+${sc}` : String(sc);
    const scColor = sc === null ? 'rgba(255,255,255,.4)' : sc < 0 ? '#6fcf8a' : sc > 0 ? '#ff8a7a' : 'rgba(255,255,255,.75)';
    const lastName = p.name.split(' ').slice(-1)[0];
    const thruStr = p.thru ? `thru ${p.thru}` : '';
    const posStr  = p.position ? `${p.position} PGA` : '';
    const sub = [thruStr, posStr].filter(Boolean).join(' · ');
    const dots = p.pickers.map(picker =>
      `<span class="picker-dot" style="background:${pickerColors[picker]};width:14px;height:14px;font-size:.52rem" title="${picker}">${picker[0]}</span>`
    ).join('');
    const href = espnUrl(p.name, p.espnId);
    return `<a class="oncourse-card player-link" href="${href}" target="_blank" rel="noopener" style="border-bottom:none">
      <div class="oncourse-score" style="color:${scColor}">${lbl}</div>
      <div class="oncourse-info">
        <div class="oncourse-name">${lastName}</div>
        ${sub ? `<div class="oncourse-sub">${sub}</div>` : ''}
        <div class="oncourse-dots">${dots}</div>
      </div>
    </a>`;
  }).join('');

  panel.style.display = 'block';
  panel.innerHTML = `<div class="oncourse-panel">
    <div class="oncourse-header">
      <span class="live-dot"></span>
      <span class="oncourse-title">On Course Now</span>
      <span class="oncourse-round">Round ${currentRound} · ${playing.length} pick${playing.length !== 1 ? 's' : ''} active</span>
    </div>
    <div class="oncourse-grid">${cards}</div>
  </div>`;
}

// ─── MOVERS ───────────────────────────────────────────────────────────────────

function renderMovers() {
  const panel = document.getElementById('movers-panel');
  const { currentRound, roundInProgress, completedRounds } = roundInfo;
  // Only meaningful once round 2+ data exists
  if (currentRound < 2 && !roundInProgress) { panel.style.display = 'none'; return; }
  const todayRound = roundInProgress ? currentRound : completedRounds;
  if (todayRound < 2) { panel.style.display = 'none'; return; }

  // Collect all unique picks from active entries
  const active = POOL.filter(e => !e.pending && !e.special);
  const pickerColors = Object.fromEntries(active.map((e, i) => [e.name, CHART_COLORS[i % CHART_COLORS.length]]));
  const allPicks = new Map(); // normName → { displayName, pickers:[] }
  active.forEach(entry => {
    entry.picks.forEach(name => {
      const k = norm(name);
      if (!allPicks.has(k)) allPicks.set(k, { displayName: name, pickers: [] });
      allPicks.get(k).pickers.push(entry.name);
    });
  });

  // Score each pick for today's round
  const movers = [];
  for (const [k, info] of allPicks) {
    const data = liveScores[k];
    if (!data || data.rounds[todayRound] === undefined) continue;
    if (data.cut) continue; // exclude cuts from movers
    movers.push({ name: info.displayName, todayScore: data.rounds[todayRound], pickers: info.pickers, playing: data.playing });
  }
  if (movers.length < 2) { panel.style.display = 'none'; return; }

  movers.sort((a, b) => a.todayScore - b.todayScore);
  const n = Math.min(4, Math.floor(movers.length / 2));
  const best  = movers.slice(0, n);
  const worst = movers.slice(-n).reverse();

  const roundLabel = roundInProgress ? `Round ${todayRound} · In Progress` : `After Round ${todayRound}`;

  function moverRow(m, type) {
    const sc   = m.todayScore;
    const lbl  = sc === 0 ? 'E' : (sc > 0 ? `+${sc}` : String(sc));
    const scCls = sc < 0 ? 'neg' : sc > 0 ? 'pos' : 'even';
    const lastName = m.name.split(' ').slice(-1)[0];
    const dots = m.pickers.map(p => `<span class="picker-dot" style="background:${pickerColors[p]}" title="${p}">${p[0]}</span>`).join('');
    const livePip = m.playing ? '<span class="live-dot" style="margin-left:3px"></span>' : '';
    return `<div class="mover-row ${type}">
      <div class="mover-left">
        <div class="mover-dots">${dots}</div>
        <span class="mover-name">${lastName}${livePip}</span>
      </div>
      <span class="mover-score ${scCls}">${lbl}</span>
    </div>`;
  }

  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="movers-header">
      <span class="movers-title">Today's Movers</span>
      <span class="movers-subtitle">${roundLabel}</span>
    </div>
    <div class="movers-grid">
      <div>
        <div class="movers-col-title" style="color:#1a7f3a">🔥 Hottest Picks</div>
        ${best.map(m => moverRow(m, 'hot')).join('')}
      </div>
      <div>
        <div class="movers-col-title" style="color:var(--red)">❄️ Struggling</div>
        ${worst.map(m => moverRow(m, 'cold')).join('')}
      </div>
    </div>`;
}

function renderPoolIntel() {
  const panel = document.getElementById('intel-panel');
  if (Object.keys(liveScores).length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';

  const active = POOL.filter(e => !e.pending && !e.special);
  const pickerColors = Object.fromEntries(active.map((e, i) => [e.name, CHART_COLORS[i % CHART_COLORS.length]]));

  // Collect all unique golfers with pickers
  const allPicks = new Map();
  active.forEach(entry => {
    entry.picks.forEach(name => {
      const k = norm(name);
      if (!allPicks.has(k)) allPicks.set(k, { displayName: name, pickers: [] });
      allPicks.get(k).pickers.push(entry.name);
    });
  });

  // Build rows: score, position, cut status
  const rows = [];
  for (const [k, info] of allPicks) {
    const data = liveScores[k];
    const score = data ? (data.cut ? 50 : data.score) : null;
    rows.push({ name: info.displayName, pickers: info.pickers, score, data });
  }
  rows.sort((a, b) => {
    if (a.score === null && b.score === null) return 0;
    if (a.score === null) return 1;
    if (b.score === null) return -1;
    return a.score - b.score;
  });

  // Header: person initials
  const headerCols = active.map(e =>
    `<th class="center" title="${e.name}"><span class="picker-dot" style="background:${pickerColors[e.name]};display:inline-flex">${e.name[0]}</span></th>`
  ).join('');

  const bodyRows = rows.map(r => {
    const sc     = r.score;
    const scFmt  = sc === null ? '—' : sc === 50 ? '+50' : sc === 0 ? 'E' : sc > 0 ? `+${sc}` : String(sc);
    const scCls  = sc === null ? '' : sc < 0 ? 'neg' : sc > 0 ? 'pos' : 'even';
    const pos    = r.data?.position || '—';
    const cut    = r.data?.cut ? ' <span style="font-size:.6rem;color:#c0392b">CUT</span>' : '';
    const lastName = r.name.split(' ').slice(-1)[0];
    const pickerDots = active.map(e => {
      const picked = r.pickers.includes(e.name);
      return `<td class="intel-dot-cell" style="text-align:center">
        ${picked ? `<span class="picker-dot" style="background:${pickerColors[e.name]}">${e.name[0]}</span>` : ''}
      </td>`;
    }).join('');
    return `<tr>
      <td><a class="player-link" href="${espnUrl(r.name, r.data?.espnId)}" target="_blank" rel="noopener">${lastName}${cut}</a></td>
      <td class="intel-score-cell ${scCls}">${scFmt}</td>
      <td class="intel-pos-cell" style="font-size:.68rem;color:#888">${pos}</td>
      ${pickerDots}
    </tr>`;
  }).join('');

  document.getElementById('intel-body').innerHTML = `
    <table class="intel-table">
      <thead><tr>
        <th>Player</th>
        <th>Score</th>
        <th class="center">PGA</th>
        ${headerCols}
      </tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>`;

  // Restore open state
  if (localStorage.getItem('intelOpen') === '1') {
    document.getElementById('intel-panel').classList.add('open');
  }
}

  for (let r = 1; r <= completedRounds; r++) {
